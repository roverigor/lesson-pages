<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turmas — Academia Lendária</title>
  <link rel="stylesheet" href="../templates/design-tokens-dark-premium.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-sans); background: #080808; color: #888; min-height: 100vh; }

    /* LOGIN */
    .login-overlay { position: fixed; inset: 0; background: #080808; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-overlay.hidden { display: none; }
    .login-box { background: #111; border: 1px solid #222; border-radius: 16px; padding: 40px; width: 90%; max-width: 380px; text-align: center; }
    .login-icon { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: inline-flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 20px; }
    .login-title { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .login-subtitle { font-size: 13px; color: #555; margin-bottom: 28px; }
    .login-field { width: 100%; padding: 12px 16px; border-radius: 8px; background: #0d0d0d; border: 1px solid #1e1e1e; color: #ddd; font-size: 14px; font-family: var(--font-sans); margin-bottom: 12px; outline: none; }
    .login-field:focus { border-color: #6366f1; }
    .login-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: var(--font-sans); margin-top: 8px; }
    .login-error { color: #ef4444; font-size: 12px; margin-top: 12px; display: none; }
    .login-error.show { display: block; }

    /* HEADER */
    .header { background: #101010; border-bottom: 1px solid #1a1a1a; padding: 20px 32px; position: sticky; top: 0; z-index: 200; }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .header-icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .header-title h1 { font-size: 18px; font-weight: 800; color: #fff; }
    .header-title p { font-size: 12px; color: #444; }
    .header-nav { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-pill { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); border-radius: 999px; padding: 8px 16px; font-size: 12px; font-weight: 600; color: #a5b4fc; text-decoration: none; white-space: nowrap; }
    .nav-pill:hover { background: rgba(99,102,241,0.2); }

    /* LAYOUT */
    .layout { max-width: 1200px; margin: 0 auto; padding: 32px; }

    /* PAGE TITLE */
    .page-title { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .page-sub { font-size: 13px; color: #444; margin-bottom: 32px; }

    /* TURMA GRID */
    .turma-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .turma-card { background: #101010; border: 1px solid #1a1a1a; border-radius: 14px; padding: 24px; cursor: pointer; text-decoration: none; color: inherit; display: block; transition: border-color .15s, background .15s; }
    .turma-card:hover { border-color: #6366f1; background: #111; }
    .turma-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
    .turma-name { font-size: 16px; font-weight: 800; color: #fff; line-height: 1.3; }
    .turma-badge { padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); white-space: nowrap; flex-shrink: 0; }
    .turma-badge.inactive { background: rgba(100,100,100,0.1); color: #555; border-color: #222; }
    .turma-stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat-item { flex: 1; min-width: 80px; background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 8px; padding: 10px 14px; }
    .stat-num { font-size: 20px; font-weight: 800; color: #fff; line-height: 1; }
    .stat-num.green { color: #4ade80; }
    .stat-num.amber { color: #f59e0b; }
    .stat-num.red { color: #f87171; }
    .stat-label { font-size: 10px; color: #444; margin-top: 2px; }
    .turma-footer { margin-top: 14px; font-size: 11px; color: #444; display: flex; align-items: center; gap: 6px; }
    .turma-footer span { color: #6366f1; font-weight: 600; }

    /* LOADING */
    .spinner { width: 28px; height: 28px; border: 3px solid #1e1e1e; border-top-color: #6366f1; border-radius: 50%; animation: spin .7s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; font-size: 14px; color: #333; }

    @media (max-width: 600px) {
      .layout { padding: 20px 16px; }
      .header { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-icon">🏛️</div>
    <div class="login-title">Turmas</div>
    <div class="login-subtitle">Acesso restrito à equipe educacional</div>
    <input class="login-field" id="login-password" type="password" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Senha incorreta</div>
  </div>
</div>

<!-- HEADER -->
<div class="header" id="app-header" style="display:none">
  <div class="header-inner">
    <div class="header-icon">🏛️</div>
    <div class="header-title">
      <h1>Turmas</h1>
      <p>Hub operacional da Academia Lendária</p>
    </div>
    <nav class="header-nav">
      <a class="nav-pill" href="../presenca/">Presença</a>
      <a class="nav-pill" href="../equipe/">Equipe</a>
      <a class="nav-pill" href="../avaliacao/">Avaliações</a>
    </nav>
  </div>
</div>

<!-- MAIN -->
<div class="layout" id="app-content" style="display:none">
  <div class="page-title">Todas as Turmas</div>
  <div class="page-sub">Clique em uma turma para ver alunos, presença e rankings</div>
  <div id="turma-list"><div class="spinner"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script>
  const SUPABASE_URL = 'https://gpufcipkajppykmnmdeh.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwdWZjaXBrYWpwcHlrbW5tZGVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzE1NzgsImV4cCI6MjA4OTk0NzU3OH0.BBmvIGbMtp3bPirWxjMXwdXkpABBV6zD1wgSQ2cB8aU';
  const ADMIN_PASSWORD = 'academia2024';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function doLogin() {
    const pwd = document.getElementById('login-password').value;
    if (pwd === ADMIN_PASSWORD) {
      localStorage.setItem('admin_auth', '1');
      showApp();
    } else {
      document.getElementById('login-error').classList.add('show');
    }
  }

  function showApp() {
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('app-header').style.display = '';
    document.getElementById('app-content').style.display = '';
    loadTurmas();
  }

  function checkAuth() {
    if (localStorage.getItem('admin_auth') === '1') showApp();
  }

  async function loadTurmas() {
    const { data: cohorts, error } = await sb
      .from('cohorts')
      .select('id, name, active')
      .order('name');

    if (error || !cohorts) {
      document.getElementById('turma-list').innerHTML = '<div class="empty-state">Erro ao carregar turmas.</div>';
      return;
    }

    if (!cohorts.length) {
      document.getElementById('turma-list').innerHTML = '<div class="empty-state">Nenhuma turma encontrada.</div>';
      return;
    }

    // Load student counts and attendance summaries in parallel
    const [studentsRes, attendanceRes] = await Promise.all([
      sb.from('students').select('id, cohort_id').eq('active', true).eq('is_mentor', false),
      sb.from('student_attendance').select('student_id, cohort_id:zoom_meetings!inner(cohort_id)', { count: 'exact' }),
    ]);

    const studentsByCohort = {};
    (studentsRes.data ?? []).forEach(s => {
      if (!studentsByCohort[s.cohort_id]) studentsByCohort[s.cohort_id] = 0;
      studentsByCohort[s.cohort_id]++;
    });

    const html = cohorts.map(c => {
      const total = studentsByCohort[c.id] ?? 0;
      const active = c.active !== false;
      return `
        <a class="turma-card" href="detalhe.html?id=${c.id}">
          <div class="turma-header">
            <div class="turma-name">${escHtml(c.name)}</div>
            <div class="turma-badge ${active ? '' : 'inactive'}">${active ? 'Ativa' : 'Encerrada'}</div>
          </div>
          <div class="turma-stats">
            <div class="stat-item">
              <div class="stat-num">${total}</div>
              <div class="stat-label">Alunos</div>
            </div>
            <div class="stat-item">
              <div class="stat-num" style="color:#6366f1">→</div>
              <div class="stat-label">Ver detalhe</div>
            </div>
          </div>
          <div class="turma-footer">Clique para ver alunos, presença e rankings <span>→</span></div>
        </a>`;
    }).join('');

    document.getElementById('turma-list').innerHTML = `<div class="turma-grid">${html}</div>`;
  }

  function escHtml(s) {
    return (s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  checkAuth();
</script>
</body>
</html>
