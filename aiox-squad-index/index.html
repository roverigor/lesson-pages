<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIOX Squad — Aulas</title>
<style>
  :root {
    --bg: #000000;
    --bg2: #0a0a0a;
    --bg3: #111111;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --accent: #D1FF00;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header img {
    width: 120px;
    height: auto;
    margin-bottom: 20px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  header p {
    margin-top: 6px;
    font-size: 14px;
    color: var(--text2);
  }

  .lessons {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .lesson-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #0f0f0f;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, background 0.2s;
  }
  .lesson-card:hover {
    border-color: var(--border-hover);
    background: #141414;
  }

  .lesson-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(209,255,0,0.08);
    border: 1px solid rgba(209,255,0,0.2);
    border-radius: 6px;
    padding: 3px 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .lesson-info {
    flex: 1;
    min-width: 0;
  }
  .lesson-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lesson-desc {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }

  .lesson-arrow {
    color: var(--text3);
    font-size: 18px;
    flex-shrink: 0;
  }
  .lesson-card:hover .lesson-arrow {
    color: var(--accent);
  }

  footer {
    margin-top: 56px;
    font-size: 12px;
    color: var(--text3);
  }
</style>
</head>
<body>

<header>
  <img src="/aiox-install/logo-aiox.svg" alt="AIOX Squad">
  <h1>AIOX Squad</h1>
  <p>Selecione uma aula para começar</p>
</header>

<div class="lessons">

  <a href="/aiox-install" class="lesson-card">
    <span class="lesson-num">Aula 01</span>
    <div class="lesson-info">
      <div class="lesson-title">Instalação do AIOX</div>
      <div class="lesson-desc">Claude Code · Codex CLI · Gemini CLI + Synkra AIOX</div>
    </div>
    <span class="lesson-arrow">→</span>
  </a>

</div>

<footer>AIOX Squad · Synkra</footer>

</body>
</html>
