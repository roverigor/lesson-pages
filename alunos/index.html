<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestao de Alunos — Academia Lendaria</title>
  <link rel="stylesheet" href="../templates/design-tokens-dark-premium.css">
  <link rel="stylesheet" href="../templates/admin-shared.css">
  <link rel="stylesheet" href="../templates/login-overlay.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-sans); background: #080808; color: #888; min-height: 100vh; }

    /* HEADER */
    .header {
      background: #101010; border-bottom: 1px solid #1a1a1a;
      padding: 20px 32px; position: sticky; top: 0; z-index: 200;
    }
    .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .header-title { display: flex; align-items: center; gap: 12px; flex: 1; }
    .header-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header-title h1 { font-size: 18px; font-weight: 800; color: #fff; }
    .header-title p { font-size: 12px; color: #444; margin-top: 1px; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .link-pill {
      background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25);
      border-radius: 999px; padding: 8px 16px; font-size: 12px; font-weight: 600;
      color: #a5b4fc; text-decoration: none; display: flex; align-items: center; gap: 6px;
      transition: all 0.15s; white-space: nowrap; cursor: pointer;
    }
    .link-pill:hover { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.4); }
    .link-pill.danger { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.25); color: #fca5a5; }

    /* LAYOUT */
    .layout { max-width: 1400px; margin: 0 auto; padding: 28px 32px 120px; }

    /* STATS */
    .stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card {
      background: #101010; border: 1px solid #1a1a1a; border-radius: 10px;
      padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex: 1; min-width: 150px;
    }
    .stat-num { font-size: 26px; font-weight: 800; color: #fff; line-height: 1; }
    .stat-label { font-size: 11px; color: #444; margin-top: 2px; }

    /* SEARCH & FILTERS */
    .toolbar {
      display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center;
    }
    .search-input {
      flex: 1; min-width: 200px; padding: 10px 16px; border-radius: 8px;
      background: #0d0d0d; border: 1px solid #1e1e1e; color: #ddd;
      font-size: 13px; font-family: var(--font-sans); outline: none;
    }
    .search-input:focus { border-color: #6366f1; }
    .search-input::placeholder { color: #333; }
    .cohort-tab {
      padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
      color: #444; cursor: pointer; border: 1px solid #1a1a1a; background: #0d0d0d;
      font-family: var(--font-sans); transition: all 0.15s; white-space: nowrap;
    }
    .cohort-tab:hover { color: #888; border-color: #333; }
    .cohort-tab.active { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.3); color: #a5b4fc; }

    /* TABLE */
    .table-wrap {
      background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden;
    }
    .students-table { width: 100%; border-collapse: collapse; }
    .students-table th {
      text-align: left; padding: 12px 16px; font-size: 10px; font-weight: 700;
      color: #444; text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 1px solid #1a1a1a; background: #0a0a0a;
    }
    .students-table td {
      padding: 12px 16px; font-size: 13px; color: #aaa;
      border-bottom: 1px solid #111;
    }
    .students-table tr:hover td { background: #101010; }
    .students-table tr.editing td { background: #0d0d1a; }

    .student-name {
      font-weight: 600; color: #ddd; display: flex; align-items: center; gap: 8px;
    }
    .student-name .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .student-phone { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: #666; }

    .cohort-badge {
      font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
    }
    .cohort-fund { background: rgba(6,182,212,0.12); color: #22d3ee; }
    .cohort-adv { background: rgba(99,102,241,0.12); color: #a5b4fc; }
    .cohort-imersao { background: rgba(251,191,36,0.12); color: #fbbf24; }
    .cohort-origin { background: rgba(255,255,255,0.05); color: #666; border: 1px dashed #333; font-style: italic; }

    .action-btn {
      padding: 5px 10px; border-radius: 6px; border: 1px solid #222;
      background: #1a1a1a; color: #666; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: var(--font-sans); transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .action-btn:hover { background: #222; color: #aaa; }
    .action-btn.whatsapp { border-color: #166534; color: #4ade80; background: rgba(34,197,94,0.08); }
    .action-btn.whatsapp:hover { background: rgba(34,197,94,0.15); }
    .action-btn.edit { border-color: #1e40af; color: #60a5fa; background: rgba(96,165,250,0.08); }
    .action-btn.save { border-color: #166534; color: #4ade80; background: rgba(34,197,94,0.12); }
    .action-btn.cancel { border-color: #44403c; color: #a8a29e; }
    .action-btn.delete { border-color: #7f1d1d; color: #f87171; background: rgba(239,68,68,0.08); }
    .action-btn.delete:hover { background: rgba(239,68,68,0.15); }
    .action-btn.staff { border-color: #92400e; color: #fbbf24; background: rgba(251,191,36,0.08); }
    .action-btn.staff:hover { background: rgba(251,191,36,0.15); }
    .action-btn.staff.active { border-color: #b45309; color: #fbbf24; background: rgba(251,191,36,0.2); }
    .staff-badge { font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 999px; background: rgba(251,191,36,0.15); color: #fbbf24; margin-left: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .filter-type { display: flex; gap: 4px; }
    .type-btn {
      padding: 6px 12px; border-radius: 6px; border: 1px solid #1e1e1e;
      background: #0d0d0d; color: #555; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: var(--font-sans); transition: all 0.15s;
    }
    .type-btn:hover { color: #888; border-color: #333; }
    .type-btn.active { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.3); color: #a5b4fc; }

    .edit-input {
      padding: 5px 8px; border-radius: 5px; background: #0a0a0a; border: 1px solid #333;
      color: #ddd; font-size: 13px; font-family: var(--font-sans); outline: none; width: 100%;
    }
    .edit-input:focus { border-color: #6366f1; }
    .alias-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25);
      color: #a5b4fc; font-size: 10px; font-weight: 600; padding: 2px 7px;
      border-radius: 999px; white-space: nowrap;
    }
    .aliases-cell { display: flex; flex-wrap: wrap; gap: 4px; }
    .edit-hint { font-size: 10px; color: #444; margin-top: 3px; }

    .actions-cell { display: flex; gap: 4px; flex-wrap: nowrap; }
    .action-btn.merge { border-color: #9333ea; color: #c084fc; background: rgba(147,51,234,0.08); }
    .action-btn.merge:hover { background: rgba(147,51,234,0.15); }

    /* MERGE MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 5000; display: flex; align-items: center; justify-content: center; }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #111; border: 1px solid #222; border-radius: 16px;
      padding: 28px; width: 95%; max-width: 640px; max-height: 80vh; overflow-y: auto;
    }
    .modal-title { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .modal-sub { font-size: 12px; color: #555; margin-bottom: 20px; }
    .merge-candidate {
      background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .merge-candidate:hover { border-color: #333; }
    .merge-candidate.selected { border-color: #9333ea; background: rgba(147,51,234,0.06); }
    .merge-candidate .mc-radio { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #333; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .merge-candidate.selected .mc-radio { border-color: #9333ea; }
    .merge-candidate.selected .mc-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #c084fc; }
    .merge-candidate .mc-info { flex: 1; }
    .merge-candidate .mc-name { font-size: 14px; font-weight: 600; color: #ddd; }
    .merge-candidate .mc-meta { font-size: 11px; color: #555; margin-top: 2px; }
    .merge-candidate .mc-cohort { font-size: 10px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .modal-btn {
      padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: var(--font-sans); border: 1px solid #333;
      background: #1a1a1a; color: #aaa; transition: all 0.15s;
    }
    .modal-btn:hover { background: #222; }
    .modal-btn.primary { background: linear-gradient(135deg, #7c3aed, #9333ea); border-color: #7c3aed; color: #fff; }
    .modal-btn.primary:hover { opacity: 0.9; }
    .modal-btn.primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .merge-result { background: #052e16; border: 1px solid #166534; border-radius: 8px; padding: 12px; margin-top: 12px; font-size: 12px; color: #4ade80; }
    .merge-bulk-btn {
      padding: 8px 14px; border-radius: 8px; border: 1px solid #7c3aed;
      background: rgba(147,51,234,0.08); color: #c084fc; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: var(--font-sans); transition: all 0.15s; white-space: nowrap;
    }
    .merge-bulk-btn:hover { background: rgba(147,51,234,0.15); }

    /* PAGINATION */
    .pagination {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-top: 1px solid #1a1a1a;
    }
    .pagination-info { font-size: 12px; color: #444; }
    .pagination-btns { display: flex; gap: 4px; }
    .page-btn {
      padding: 6px 12px; border-radius: 6px; border: 1px solid #1e1e1e;
      background: #0d0d0d; color: #555; font-size: 12px; cursor: pointer;
      font-family: var(--font-sans); transition: all 0.15s;
    }
    .page-btn:hover { color: #aaa; border-color: #333; }
    .page-btn.active { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.3); color: #a5b4fc; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* EMPTY */
    .empty { text-align: center; padding: 60px 20px; color: #333; font-size: 14px; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
      border-radius: 10px; font-size: 13px; font-weight: 600;
      z-index: 2000; transition: all 0.3s; transform: translateY(80px); opacity: 0;
      font-family: var(--font-sans);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #052e16; border: 1px solid #166534; color: #4ade80; }
    .toast.error { background: #2d0a0a; border: 1px solid #7f1d1d; color: #f87171; }

    @media (max-width: 768px) {
      .header { padding: 14px 16px; }
      .layout { padding: 16px 12px 80px; }
      .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .students-table th:nth-child(4), .students-table td:nth-child(4) { display: none; }
      .stat-card { min-width: 120px; }
      .search-input { min-width: 0; }
      .toast { bottom: 16px; right: 12px; left: 12px; max-width: none; }
    }
    @media (max-width: 480px) {
      .students-table th:nth-child(3), .students-table td:nth-child(3) { display: none; }
      .students-table th:nth-child(5), .students-table td:nth-child(5) { display: none; }
      .stats-row { flex-wrap: wrap; gap: 8px; }
      .stat-card { min-width: 100px; flex: 1; }
      .pagination { flex-direction: column; gap: 8px; }
      .toolbar { gap: 6px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-icon">👥</div>
    <div class="login-title">Gestao de Alunos</div>
    <div class="login-subtitle">Acesse para gerenciar alunos e disparos</div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <input class="login-field" type="email" id="login-email" placeholder="Email" required autocomplete="email">
      <input class="login-field" type="password" id="login-password" placeholder="Senha" required autocomplete="current-password">
      <button class="login-btn" type="submit" id="login-btn">Entrar</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- HEADER -->
<header class="header" id="app-header" style="display:none">
  <div class="header-inner">
    <div class="header-title">
      <div class="header-icon">👥</div>
      <div>
        <h1>Gestão de Alunos</h1>
        <p>Fonte: CSV importados por turma</p>
      </div>
    </div>
    <div class="header-actions">
      <a href="/" class="link-pill">Home</a>
      <a href="/presenca" class="link-pill">Presenca</a>
      <a href="/aulas" class="link-pill">Aulas</a>
      <a href="/calendario/admin" class="link-pill">Admin</a>
      <span class="link-pill danger" onclick="handleLogout()">Sair</span>
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="layout" id="app-main" style="display:none">

  <!-- STATS -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input class="search-input" id="search" placeholder="Buscar por nome, email, telefone ou produto..." oninput="handleSearch()">
    <div id="cohort-tabs"></div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table class="students-table">
      <thead>
        <tr>
          <th>Aluno</th>
          <th>Telefone</th>
          <th>Email</th>
          <th>Turma</th>
          <th>Compra</th>
          <th>WA</th>
        </tr>
      </thead>
      <tbody id="students-body"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<!-- MERGE MODAL -->
<div class="modal-overlay hidden" id="merge-modal" onclick="if(event.target===this)closeMergeModal()">
  <div class="modal-box">
    <div class="modal-title" id="merge-title">Mesclar Alunos</div>
    <div class="modal-sub" id="merge-sub">Selecione o registro principal (os outros serão mesclados nele)</div>
    <div id="merge-candidates"></div>
    <div id="merge-result-box"></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeMergeModal()">Cancelar</button>
      <button class="modal-btn primary" id="merge-confirm-btn" onclick="executeMerge()" disabled>Mesclar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="/js/config.js"></script>
<script src="../templates/utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script>
const SUPABASE_URL = window.SUPABASE_CONFIG.url;
const SUPABASE_KEY = window.SUPABASE_CONFIG.anonKey;
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allStudents = [];
let cohorts = [];
let currentCohort = 'all';
let currentSearch = '';
let currentTypeFilter = 'all';
let currentPage = 1;
const PAGE_SIZE = 50;
let editingId = null;

// handleLogin provided by utils.js

async function handleLogout() {
  await sb.auth.signOut();
  location.reload();
}

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showApp();
}

async function showApp() {
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('app-header').style.display = '';
  document.getElementById('app-main').style.display = '';
  await loadData();
}

// DATA
async function loadData() {
  const [{ data: c }, { data: csv }, { data: sysStudents }] = await Promise.all([
    sb.from('cohorts').select('*').order('name'),
    sb.from('student_imports').select('*, cohorts(name)').order('name'),
    sb.from('students').select('id, name, phone, cohort_id, is_mentor, aliases').eq('active', true),
  ]);
  cohorts = c || [];

  // Build lookup from students table (for enrichment: aliases, is_mentor)
  const sysByPhone = {};
  (sysStudents || []).forEach(s => {
    if (s.phone) {
      const key = s.phone.replace(/\D/g, '');
      if (!sysByPhone[key]) sysByPhone[key] = [];
      sysByPhone[key].push(s);
    }
  });

  // Map CSV imports to allStudents, enriched with system data
  allStudents = (csv || []).map(ci => {
    const phoneKey = (ci.phone || '').replace(/\D/g, '');
    const sysMatch = phoneKey ? (sysByPhone[phoneKey] || []).find(s => s.cohort_id === ci.cohort_id) || (sysByPhone[phoneKey] || [])[0] : null;
    return {
      ...ci,
      _cohortNames: [ci.cohorts?.name || ''],
      _sysId: sysMatch?.id || null,
      is_mentor: sysMatch?.is_mentor || false,
      aliases: sysMatch?.aliases || [],
      _hasSystemRecord: !!sysMatch,
    };
  });

  // Cross-cohort: show other cohorts for same phone
  const phoneMap = {};
  for (const s of allStudents) {
    if (!s.phone) continue;
    const key = s.phone.replace(/\D/g, '');
    if (!phoneMap[key]) phoneMap[key] = [];
    phoneMap[key].push(s);
  }
  for (const s of allStudents) {
    if (!s.phone) continue;
    const key = s.phone.replace(/\D/g, '');
    const siblings = phoneMap[key] || [];
    for (const sib of siblings) {
      if (sib.id === s.id) continue;
      const sibCohort = sib.cohorts?.name;
      if (sibCohort && !s._cohortNames.includes(sibCohort)) {
        s._cohortNames.push(sibCohort);
      }
    }
  }

  renderStats();
  renderCohortTabs();
  renderTable();
}

// STATS
function renderStats() {
  const filtered = getFiltered();
  const totalCSV = allStudents.length;
  const withSystem = allStudents.filter(s => s._hasSystemRecord).length;
  const withoutSystem = totalCSV - withSystem;
  // Unique phones (dedup across cohorts)
  const uniquePhones = new Set(allStudents.filter(s => s.phone).map(s => s.phone.replace(/\D/g, '')));
  const cohortCount = new Set(allStudents.map(s => s.cohort_id)).size;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div><div class="stat-num">${totalCSV}</div><div class="stat-label">Total Alunos (CSV)</div></div></div>
    <div class="stat-card"><div><div class="stat-num">${uniquePhones.size}</div><div class="stat-label">Telefones únicos</div></div></div>
    <div class="stat-card"><div><div class="stat-num">${cohortCount}</div><div class="stat-label">Turmas</div></div></div>
    <div class="stat-card"><div><div class="stat-num" style="color:#4ade80">${withSystem}</div><div class="stat-label">Com registro sistema</div></div></div>
    <div class="stat-card"><div><div class="stat-num" style="color:${withoutSystem > 0 ? '#f59e0b' : '#4ade80'}">${withoutSystem}</div><div class="stat-label">Sem registro sistema</div></div></div>
  `;
}

function setTypeFilter(type) {
  // CSV-only mode: type filter not applicable
  currentPage = 1;
  renderTable();
}

// COHORT TABS
function renderCohortTabs() {
  const tabs = document.getElementById('cohort-tabs');
  const counts = {};
  for (const s of allStudents) {
    const cn = s.cohorts?.name || 'Sem turma';
    counts[cn] = (counts[cn] || 0) + 1;
  }
  tabs.innerHTML = `<button class="cohort-tab ${currentCohort === 'all' ? 'active' : ''}" onclick="setCohort('all')">Todos (${allStudents.length})</button>` +
    cohorts.map(c => {
      const cnt = counts[c.name] || 0;
      if (cnt === 0) return '';
      const cls = currentCohort === c.name ? 'active' : '';
      return `<button class="cohort-tab ${cls}" onclick="setCohort('${c.name}')">${c.name} (${cnt})</button>`;
    }).join('');
}

function setCohort(name) {
  currentCohort = name;
  currentPage = 1;
  renderCohortTabs();
  renderStats();
  renderTable();
}

function handleSearch() {
  currentSearch = document.getElementById('search').value.toLowerCase();
  currentPage = 1;
  renderTable();
}

// FILTER
function getFiltered() {
  return allStudents.filter(s => {
    if (currentCohort !== 'all') {
      if (!(s._cohortNames || []).includes(currentCohort)) return false;
    }
    if (currentSearch) {
      const aliasStr = (Array.isArray(s.aliases) ? s.aliases : []).join(' ');
      const hay = `${s.name || ''} ${s.email || ''} ${s.phone || ''} ${s.product || ''} ${(s._cohortNames || []).join(' ')} ${aliasStr}`.toLowerCase();
      if (!hay.includes(currentSearch)) return false;
    }
    return true;
  });
}

// RENDER TABLE
function renderTable() {
  const filtered = getFiltered();
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  const body = document.getElementById('students-body');
  if (!page.length) {
    body.innerHTML = '<tr><td colspan="6" class="empty">Nenhum aluno encontrado no CSV</td></tr>';
    renderPagination(filtered.length, totalPages);
    return;
  }

  body.innerHTML = page.map(s => {
    const cohortNames = (s._cohortNames || []).length > 0 ? s._cohortNames : [s.cohorts?.name || '—'];
    const primaryCohort = s.cohorts?.name || '';
    const cohortBadges = cohortNames.map(cn => {
      const isPrimary = cn === primaryCohort;
      let cls;
      if (cn.includes('Imersão')) cls = 'cohort-imersao';
      else if (!isPrimary) cls = 'cohort-origin';
      else if (cn.includes('Advanced')) cls = 'cohort-adv';
      else cls = 'cohort-fund';
      const label = isPrimary ? cn : `← ${cn}`;
      return `<span class="cohort-badge ${cls}" style="margin-right:2px" title="${isPrimary ? 'Turma atual' : 'Veio de'}">${label}</span>`;
    }).join('');
    const color = getColor(s.name || s.phone);
    const initials = getInitials(s.name || s.phone);
    const displayName = s.name || '<span style="color:#333;font-style:italic">Sem nome</span>';
    const phone = s.phone || '';
    const waLink = phone ? `https://wa.me/${phone}` : '#';

    const upgradeBadge = s.upgrade
      ? ` <span style="font-size:10px;padding:2px 6px;border-radius:4px;background:#8b5cf615;border:1px solid #8b5cf630;color:#a78bfa">${s.upgrade}</span>`
      : '';
    const sysIcon = s._hasSystemRecord
      ? '<span title="Registro no sistema" style="color:#4ade80;font-size:10px;margin-left:4px">●</span>'
      : '<span title="Sem registro no sistema" style="color:#333;font-size:10px;margin-left:4px">○</span>';

    const emailCell = s.email
      ? `<span style="font-size:11px;color:#555">${s.email}</span>`
      : '<span style="color:#2a2a2a;font-size:11px">—</span>';

    const purchaseDate = s.purchase_date
      ? new Date(s.purchase_date + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' })
      : '';

    return `<tr>
      <td><div class="student-name"><div class="avatar" style="background:${color}">${initials}</div>${displayName}${upgradeBadge}${sysIcon}</div></td>
      <td><span class="student-phone">${formatPhone(phone)}</span></td>
      <td>${emailCell}</td>
      <td>${cohortBadges}</td>
      <td style="font-size:11px;color:#444">${purchaseDate}</td>
      <td>${phone ? `<a href="${waLink}" target="_blank" class="action-btn whatsapp">WA</a>` : ''}</td>
    </tr>`;
  }).join('');

  renderPagination(filtered.length, totalPages);
}

function renderPagination(total, totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) {
    el.innerHTML = `<span class="pagination-info">${total} aluno${total !== 1 ? 's' : ''}</span><div></div>`;
    return;
  }
  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, total);

  let btns = '';
  for (let i = 1; i <= totalPages; i++) {
    if (totalPages > 7 && i > 3 && i < totalPages - 2 && Math.abs(i - currentPage) > 1) {
      if (i === 4 || i === totalPages - 3) btns += '<span style="color:#333;padding:0 4px">...</span>';
      continue;
    }
    btns += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }

  el.innerHTML = `
    <span class="pagination-info">${start}-${end} de ${total}</span>
    <div class="pagination-btns">
      <button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>Ant</button>
      ${btns}
      <button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>Prox</button>
    </div>
  `;
}

function goPage(p) {
  const filtered = getFiltered();
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
  window.scrollTo({ top: 300, behavior: 'smooth' });
}

// UTILS
function getColor(name) {
  const colors = ['#6366f1','#10b981','#f59e0b','#ec4899','#06b6d4','#8b5cf6','#ef4444','#14b8a6','#f97316','#a855f7'];
  let h = 0; for (const c of (name || '')) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').filter(Boolean).map(w => w[0]).slice(0, 2).join('').toUpperCase();
}

function formatPhone(phone) {
  if (!phone || phone.startsWith('merged_')) return phone || '—';
  // Brazil: +55 (DD) XXXXX-XXXX
  if (phone.startsWith('55') && phone.length >= 12) {
    const ddd = phone.slice(2, 4);
    const num = phone.slice(4);
    if (num.length === 9) return `+55 (${ddd}) ${num.slice(0,5)}-${num.slice(5)}`;
    if (num.length === 8) return `+55 (${ddd}) ${num.slice(0,4)}-${num.slice(4)}`;
  }
  // Portugal: +351 XXX XXX XXX
  if (phone.startsWith('351') && phone.length >= 12) {
    const num = phone.slice(3);
    return `+351 ${num.slice(0,3)} ${num.slice(3,6)} ${num.slice(6)}`;
  }
  // Known country codes (2-3 digits) — generic international format
  const intlCodes = [
    { code: '244', name: 'AO' }, { code: '971', name: 'AE' },
    { code: '353', name: 'IE' }, { code: '49', name: 'DE' },
    { code: '43', name: 'AT' }, { code: '41', name: 'CH' },
    { code: '34', name: 'ES' }, { code: '1', name: 'US' },
  ];
  for (const { code } of intlCodes) {
    if (phone.startsWith(code) && phone.length >= code.length + 6) {
      const num = phone.slice(code.length);
      // Group in chunks of 3
      const parts = num.match(/.{1,3}/g) || [num];
      return `+${code} ${parts.join(' ')}`;
    }
  }
  return '+' + phone;
}

// showToast provided by utils.js

// ── MERGE ──
let mergeSelectedPrimary = null;
let mergeCandidates = [];

function showMergeForPhone(phone) {
  mergeCandidates = allStudents.filter(s => s.phone === phone);
  if (mergeCandidates.length < 2) { showToast('Nenhum duplicado encontrado', 'error'); return; }
  mergeSelectedPrimary = null;
  renderMergeModal();
  document.getElementById('merge-modal').classList.remove('hidden');
}

async function showBulkMerge() {
  // Load duplicate groups from RPC
  const { data, error } = await sb.rpc('find_duplicate_students');
  if (error) { showToast('Erro ao buscar duplicados: ' + error.message, 'error'); return; }
  if (!data || data.length === 0) { showToast('Nenhum duplicado encontrado!'); return; }

  // Show first group for merge
  const group = data[0];
  mergeCandidates = allStudents.filter(s => group.student_ids.includes(s.id));
  if (mergeCandidates.length < 2) {
    // Students might have been merged already, reload
    await loadData();
    showToast('Dados recarregados, tente novamente');
    return;
  }
  mergeSelectedPrimary = null;
  document.getElementById('merge-title').textContent = `Mesclar Duplicados (${data.length} grupos)`;
  document.getElementById('merge-sub').textContent = `Grupo 1/${data.length} — Telefone: ${formatPhone(group.phone)}. Selecione o registro principal.`;
  renderMergeModal();
  document.getElementById('merge-modal').classList.remove('hidden');
}

function renderMergeModal() {
  const box = document.getElementById('merge-candidates');
  document.getElementById('merge-result-box').innerHTML = '';
  box.innerHTML = mergeCandidates.map(s => {
    const sel = mergeSelectedPrimary === s.id ? 'selected' : '';
    const cohortNames = (s._cohortNames || []).join(', ') || s.cohorts?.name || '—';
    const hasPhone = s.phone && !s.phone.startsWith('pending_') && !s.phone.startsWith('merged_');
    const hasEmail = !!s.email;
    const meta = [
      hasPhone ? formatPhone(s.phone) : 'Sem telefone',
      hasEmail ? s.email : null,
      s.aliases?.length ? `Aliases: ${s.aliases.join(', ')}` : null
    ].filter(Boolean).join(' · ');
    return `<div class="merge-candidate ${sel}" onclick="selectMergePrimary('${s.id}')">
      <div class="mc-radio"></div>
      <div class="mc-info">
        <div class="mc-name">${s.name || '<i>Sem nome</i>'}</div>
        <div class="mc-meta">${meta}</div>
        <div class="mc-cohort">${cohortNames}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('merge-confirm-btn').disabled = !mergeSelectedPrimary;
}

function selectMergePrimary(id) {
  mergeSelectedPrimary = id;
  renderMergeModal();
}

function closeMergeModal() {
  document.getElementById('merge-modal').classList.add('hidden');
  mergeCandidates = [];
  mergeSelectedPrimary = null;
}

async function executeMerge() {
  if (!mergeSelectedPrimary || mergeCandidates.length < 2) return;
  const btn = document.getElementById('merge-confirm-btn');
  btn.disabled = true;
  btn.textContent = 'Mesclando...';

  const secondaryIds = mergeCandidates.filter(s => s.id !== mergeSelectedPrimary).map(s => s.id);
  const primary = mergeCandidates.find(s => s.id === mergeSelectedPrimary);

  const { data, error } = await sb.rpc('merge_students', {
    p_primary_id: mergeSelectedPrimary,
    p_secondary_ids: secondaryIds,
  });

  if (error || !data?.ok) {
    showToast('Erro ao mesclar: ' + (error?.message || data?.error || 'Desconhecido'), 'error');
    btn.disabled = false;
    btn.textContent = 'Mesclar';
    return;
  }

  document.getElementById('merge-result-box').innerHTML = `
    <div class="merge-result">
      Mesclado com sucesso! ${data.merged_count} registro(s) consolidado(s) em "${primary?.name || 'Aluno'}".
      Cohorts: ${(data.cohorts || []).length} · Aliases: ${(data.aliases || []).length}
    </div>`;

  btn.textContent = 'Concluído';
  showToast(`${data.merged_count} registro(s) mesclado(s)`);

  // Reload data after a brief pause
  setTimeout(async () => {
    closeMergeModal();
    await loadData();
  }, 1500);
}

// INIT
checkSession();
