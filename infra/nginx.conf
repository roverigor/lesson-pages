server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net unpkg.com fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; font-src fonts.gstatic.com; connect-src 'self' *.supabase.co unpkg.com cdn.jsdelivr.net; img-src 'self' data:; frame-ancestors 'none'" always;

    # ── Rewrites (equivalente ao vercel.json) ─────────
    location = /calendario/admin {
        try_files /calendario/admin.html =404;
    }
    location = /calendario {
        try_files /calendario/index.html =404;
    }
    location = /escala {
        try_files /escala/index.html =404;
    }
    location = /abstracts {
        try_files /abstracts/index.html =404;
    }
    location = /analise-interna {
        try_files /analise-interna/index.html =404;
    }
    location = /squad-creator {
        try_files /squad-creator/index.html =404;
    }
    location = /manual-aios {
        try_files /manual-aios/index.html =404;
    }
    location = /aios-install {
        try_files /aios-install/index.html =404;
    }
    location = /alunos {
        try_files /alunos/index.html =404;
    }
    location = /api/zoom/callback {
        try_files /api/zoom/callback.html =404;
    }
    location = /presenca {
        try_files /presenca/index.html =404;
    }
    location = /aulas {
        try_files /aulas/index.html =404;
    }
    location = /equipe {
        try_files /equipe/index.html =404;
    }
    location = /relatorio {
        try_files /relatorio/index.html =404;
    }
    location = /avaliacao {
        try_files /avaliacao/index.html =404;
    }

    # ── Arquivos estáticos com cache ──────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Fallback geral ────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
