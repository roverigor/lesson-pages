server {
    listen 80;
    server_name _;

    # ── Gzip Compression ──────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2
        font/woff;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net unpkg.com fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; font-src fonts.gstatic.com; connect-src 'self' *.supabase.co unpkg.com cdn.jsdelivr.net; img-src 'self' data:; frame-ancestors 'self' https://painel.igorrover.com.br" always;

    # ── Rewrites (equivalente ao vercel.json) ─────────
    location = /calendario/admin {
        try_files /calendario/admin.html =404;
    }
    location = /calendario {
        try_files /calendario/index.html =404;
    }
    location = /escala {
        try_files /escala/index.html =404;
    }
    location = /abstracts {
        try_files /abstracts/index.html =404;
    }
    location = /squad-creator {
        try_files /squad-creator/index.html =404;
    }
    location = /manual-aios {
        try_files /manual-aios/index.html =404;
    }
    location = /aios-install {
        try_files /aios-install/index.html =404;
    }
    location = /aiox-install {
        try_files /aiox-install/index.html =404;
    }
    location = /alunos {
        try_files /alunos/index.html =404;
    }
    location = /api/zoom/callback {
        try_files /api/zoom/callback.html =404;
    }
    location = /presenca {
        try_files /presenca/index.html =404;
    }
    location = /aulas {
        try_files /aulas/index.html =404;
    }
    location = /equipe {
        try_files /equipe/index.html =404;
    }
    location = /relatorio {
        try_files /relatorio/index.html =404;
    }
    location = /avaliacao {
        try_files /avaliacao/index.html =404;
    }

    # ── HTML: nunca cachear (garante headers atualizados) ─
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ── Arquivos estáticos com cache ──────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = / {
        try_files /landing.html =404;
    }

    location = /admin {
        return 301 /admin/;
    }

    # ── Fallback geral ────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
