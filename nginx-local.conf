# Nginx config local (usado por docker-compose.local.yml)
# Serve estático + suporte SPA fallback opcional
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # MIME types pra CSS/JS
    location / {
        try_files $uri $uri/ =404;
    }

    # CORS pra fetch local (Supabase APIs em outros hosts)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Disable cache em dev (sempre fresh)
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
}
