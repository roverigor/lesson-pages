<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avaliação · Academia Lendária</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <style>
    :root { --accent: #6366f1; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808;
      color: #ddd;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container { width: 100%; max-width: 520px; }

    .progress-bar {
      height: 3px;
      background: #1a1a1a;
      border-radius: 2px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .4s ease;
    }

    .card {
      background: #0f0f0f;
      border: 1px solid #1e1e1e;
      border-radius: 20px;
      padding: 36px 32px;
    }

    .brand {
      font-size: 11px;
      color: #333;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .q-counter {
      font-size: 11px;
      color: #444;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .question {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      line-height: 1.35;
      margin-bottom: 32px;
    }

    /* NPS */
    .nps-grid {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      gap: 5px;
      margin-bottom: 8px;
    }
    .nps-btn {
      aspect-ratio: 1;
      border: 1px solid #222;
      border-radius: 8px;
      background: #0d0d0d;
      color: #666;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .nps-btn:hover { border-color: var(--accent); color: #fff; }
    .nps-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
    .nps-btn.det.selected  { background: #ef4444; border-color: #ef4444; }
    .nps-btn.neu.selected  { background: #f59e0b; border-color: #f59e0b; }
    .nps-btn.pro.selected  { background: #22c55e; border-color: #22c55e; }
    .nps-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #444;
      margin-bottom: 28px;
    }

    /* CSAT stars */
    .stars-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .star-btn {
      font-size: 42px;
      cursor: pointer;
      color: #222;
      transition: all .15s;
      background: none;
      border: none;
      line-height: 1;
    }
    .star-btn.filled { color: #f59e0b; }
    .star-btn:hover  { transform: scale(1.15); }
    .stars-label {
      text-align: center;
      font-size: 12px;
      color: #444;
      margin-bottom: 28px;
      min-height: 18px;
    }

    /* Text */
    .text-input {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 12px 14px;
      color: #ddd;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 100px;
      transition: border-color .15s;
      margin-bottom: 20px;
    }
    .text-input:focus { outline: none; border-color: var(--accent); }

    /* Choice / Multi */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-size: 14px;
      color: #ccc;
      user-select: none;
    }
    .option-item:hover { border-color: #333; }
    .option-item.selected { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); color: #fff; }
    .option-dot {
      width: 18px;
      height: 18px;
      border: 2px solid #333;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .15s, background .15s;
    }
    .option-item.selected .option-dot { border-color: var(--accent); background: var(--accent); }
    .option-item.selected .option-dot::after { content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%; }
    .option-sq {
      width: 18px;
      height: 18px;
      border: 2px solid #333;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .15s, background .15s;
    }
    .option-item.selected .option-sq { border-color: var(--accent); background: var(--accent); }
    .option-item.selected .option-sq::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

    /* Scale */
    .scale-grid {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .scale-btn {
      flex: 1;
      min-width: 36px;
      height: 44px;
      border: 1px solid #222;
      border-radius: 8px;
      background: #0d0d0d;
      color: #666;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .scale-btn:hover { border-color: #f97316; color: #fff; }
    .scale-btn.selected { background: #f97316; border-color: #f97316; color: #fff; }

    /* CTA button */
    .cta-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: background .15s, opacity .15s;
    }
    .cta-btn:hover:not(:disabled) { background: #4f52d4; }
    .cta-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Screens */
    .screen { display: none; }
    .screen.active { display: block; }

    /* Intro */
    .intro-title { font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 10px; }
    .intro-sub   { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 28px; }

    /* Thank you */
    .thanks-icon {
      width: 72px; height: 72px;
      background: rgba(34,197,94,.12);
      border: 2px solid rgba(34,197,94,.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 20px;
    }
    .thanks-title { font-size: 24px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 8px; }
    .thanks-sub   { font-size: 14px; color: #555; text-align: center; }

    /* Error screen */
    .error-icon  { font-size: 36px; text-align: center; margin-bottom: 16px; }
    .error-title { font-size: 18px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 8px; }
    .error-msg   { font-size: 13px; color: #555; text-align: center; }

    /* Spinner */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1e1e1e;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 32px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
      .question { font-size: 18px; }
      .nps-btn { font-size: 11px; }
      .star-btn { font-size: 36px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="card">

    <!-- Loading -->
    <div class="screen active" id="screen-loading">
      <div class="spinner"></div>
    </div>

    <!-- Error -->
    <div class="screen" id="screen-error">
      <div class="error-icon">😔</div>
      <div class="error-title" id="error-title">Link inválido</div>
      <div class="error-msg" id="error-msg">Este link de avaliação é inválido, expirado ou já foi respondido.</div>
    </div>

    <!-- Intro screen (optional) -->
    <div class="screen" id="screen-intro">
      <div class="brand">Academia Lendária</div>
      <div class="intro-title">Olá! 👋</div>
      <div class="intro-sub" id="intro-text"></div>
      <button class="cta-btn" onclick="startQuestions()">Começar →</button>
    </div>

    <!-- Question screen -->
    <div class="screen" id="screen-question">
      <button id="btn-back" onclick="prevQuestion()" style="display:none;background:none;border:none;color:#444;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;padding:0;margin-bottom:18px;transition:color .15s" onmouseover="this.style.color='#aaa'" onmouseout="this.style.color='#444'">← Voltar</button>
      <div class="brand">Academia Lendária</div>
      <div class="q-counter" id="q-counter"></div>
      <div class="question" id="question-text"></div>
      <div id="q-widget"></div>
      <button class="cta-btn" id="btn-next" disabled onclick="nextQuestion()">Continuar →</button>
    </div>

    <!-- Thank you -->
    <div class="screen" id="screen-thanks">
      <div class="thanks-icon">✓</div>
      <div class="thanks-title">Obrigado!</div>
      <div class="thanks-sub">Sua avaliação foi registrada com sucesso.<br>Seu feedback nos ajuda a melhorar cada vez mais. 🚀</div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script>
  const SUPABASE_URL  = 'https://gpufcipkajppykmnmdeh.supabase.co';
  const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwdWZjaXBrYWpwcHlrbW5tZGVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzE1NzgsImV4cCI6MjA4OTk0NzU3OH0.BBmvIGbMtp3bPirWxjMXwdXkpABBV6zD1wgSQ2cB8aU';
  const FUNCTIONS_URL = 'https://gpufcipkajppykmnmdeh.supabase.co/functions/v1';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let surveyData  = null;
  let linkData    = null;
  let questions   = [];   // survey_questions ordered by position
  let currentQIdx = 0;
  let answers     = [];   // [{ question_id, value_text?, value_number?, value_options? }]

  const STAR_LABELS = ['', 'Muito insatisfeito', 'Insatisfeito', 'Regular', 'Satisfeito', 'Muito satisfeito'];

  // ─── Init ───
  async function init() {
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) { showError('Link inválido', 'Nenhum token de avaliação encontrado no link.'); return; }

    const { data, error } = await sb
      .from('survey_links')
      .select('id, token, used_at, expires_at, survey_id, students(id, name), surveys(id, type, name, question, follow_up, intro_text, accent_color, status)')
      .eq('token', token)
      .single();

    if (error || !data) { showError('Link inválido', 'Este link de avaliação é inválido.'); return; }
    if (data.used_at)   { showError('Avaliação já enviada', 'Sua resposta já foi registrada. Obrigado! 🚀'); return; }
    if (data.expires_at && new Date(data.expires_at) < new Date()) {
      showError('Prazo encerrado', 'O link de avaliação expirou após 7 dias. Entre em contato com o coordenador caso precise avaliar.'); return;
    }
    if (!data.surveys || data.surveys.status === 'draft') {
      showError('Avaliação indisponível', 'Esta avaliação ainda não está disponível.'); return;
    }

    linkData   = data;
    surveyData = data.surveys;

    // Apply accent color
    if (surveyData.accent_color) {
      document.documentElement.style.setProperty('--accent', surveyData.accent_color);
    }

    // Load questions from survey_questions table
    const { data: qs } = await sb
      .from('survey_questions')
      .select('*')
      .eq('survey_id', surveyData.id)
      .order('position');

    questions = qs || [];

    // If no questions in new table, fall back to legacy single-question mode
    if (questions.length === 0 && surveyData.question) {
      questions = [{
        id: '__legacy__',
        type: surveyData.type === 'nps' ? 'nps' : 'csat',
        label: surveyData.question,
        required: true,
        follow_up: surveyData.follow_up,
        options: null,
        scale_max: null,
        placeholder: null,
      }];
      if (surveyData.follow_up) {
        questions.push({
          id: '__legacy_fu__',
          type: 'text',
          label: surveyData.follow_up,
          required: false,
          options: null,
          scale_max: null,
          placeholder: 'Sua resposta (opcional)...',
        });
      }
    }

    if (questions.length === 0) {
      showError('Formulário vazio', 'Este formulário não possui perguntas.'); return;
    }

    // Show intro if exists
    if (surveyData.intro_text) {
      document.getElementById('intro-text').textContent = surveyData.intro_text;
      showScreen('screen-intro');
      setProgress(5);
    } else {
      startQuestions();
    }
  }

  function startQuestions() {
    currentQIdx = 0;
    renderQuestion(currentQIdx);
    showScreen('screen-question');
  }

  // ─── Render question ───
  function renderQuestion(idx) {
    const q = questions[idx];
    const total = questions.length;

    document.getElementById('q-counter').textContent = `Pergunta ${idx + 1} de ${total}`;
    document.getElementById('question-text').textContent = q.label;

    const pct = Math.round(((idx) / total) * 80) + 10;
    setProgress(pct);

    // Botão voltar: visível a partir da segunda pergunta
    const btnBack = document.getElementById('btn-back');
    btnBack.style.display = idx > 0 ? 'block' : 'none';

    const btnNext = document.getElementById('btn-next');
    btnNext.textContent = idx === total - 1 ? 'Enviar avaliação' : 'Continuar →';
    btnNext.disabled = q.required;   // disabled until answered (if required)

    const widget = document.getElementById('q-widget');
    widget.innerHTML = '';

    if (q.type === 'nps') {
      renderNPS(widget, q, idx);
    } else if (q.type === 'csat') {
      renderCSAT(widget, q, idx);
    } else if (q.type === 'text') {
      renderText(widget, q, idx);
    } else if (q.type === 'choice') {
      renderChoice(widget, q, idx);
    } else if (q.type === 'multi') {
      renderMulti(widget, q, idx);
    } else if (q.type === 'scale') {
      renderScale(widget, q, idx);
    }
  }

  // ─── NPS ───
  function renderNPS(container, q, idx) {
    const grid = document.createElement('div');
    grid.className = 'nps-grid';
    for (let i = 0; i <= 10; i++) {
      const cls = i <= 6 ? 'det' : i <= 8 ? 'neu' : 'pro';
      const btn = document.createElement('button');
      btn.className = `nps-btn ${cls}`;
      btn.textContent = i;
      btn.onclick = () => {
        grid.querySelectorAll('.nps-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        setAnswer(idx, q.id, { value_number: i });
        enableNext();
      };
      grid.appendChild(btn);
    }
    const labels = document.createElement('div');
    labels.className = 'nps-labels';
    labels.innerHTML = '<span>Nada satisfeito</span><span>Muito satisfeito</span>';
    container.appendChild(grid);
    container.appendChild(labels);
  }

  // ─── CSAT ───
  function renderCSAT(container, q, idx) {
    const row = document.createElement('div');
    row.className = 'stars-row';
    const lbl = document.createElement('div');
    lbl.className = 'stars-label';
    lbl.textContent = 'Clique em uma estrela';

    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement('button');
      btn.className = 'star-btn';
      btn.textContent = '★';
      btn.dataset.val = i;
      btn.onclick = () => {
        row.querySelectorAll('.star-btn').forEach((b, bi) => b.classList.toggle('filled', bi < i));
        lbl.textContent = STAR_LABELS[i] || '';
        setAnswer(idx, q.id, { value_number: i });
        enableNext();
      };
      row.appendChild(btn);
    }
    container.appendChild(row);
    container.appendChild(lbl);
  }

  // ─── Text ───
  function renderText(container, q, idx) {
    const ta = document.createElement('textarea');
    ta.className = 'text-input';
    ta.placeholder = q.placeholder || 'Sua resposta...';
    ta.oninput = () => {
      setAnswer(idx, q.id, { value_text: ta.value.trim() || null });
      if (!q.required) enableNext();
      else document.getElementById('btn-next').disabled = !ta.value.trim();
    };
    // Non-required: enable immediately
    if (!q.required) {
      document.getElementById('btn-next').disabled = false;
    }
    container.appendChild(ta);
  }

  // ─── Choice (single) ───
  function renderChoice(container, q, idx) {
    const list = document.createElement('div');
    list.className = 'options-list';
    const opts = typeof q.options === 'string' ? JSON.parse(q.options) : (q.options || []);
    opts.forEach(opt => {
      const item = document.createElement('div');
      item.className = 'option-item';
      item.innerHTML = `<div class="option-dot"></div><span>${escHtml(opt)}</span>`;
      item.onclick = () => {
        list.querySelectorAll('.option-item').forEach(i => i.classList.remove('selected'));
        item.classList.add('selected');
        setAnswer(idx, q.id, { value_text: opt });
        enableNext();
      };
      list.appendChild(item);
    });
    container.appendChild(list);
  }

  // ─── Multi (multiple selection) ───
  function renderMulti(container, q, idx) {
    const selected = new Set();
    const list = document.createElement('div');
    list.className = 'options-list';
    const opts = typeof q.options === 'string' ? JSON.parse(q.options) : (q.options || []);
    opts.forEach(opt => {
      const item = document.createElement('div');
      item.className = 'option-item';
      item.innerHTML = `<div class="option-sq"></div><span>${escHtml(opt)}</span>`;
      item.onclick = () => {
        if (selected.has(opt)) {
          selected.delete(opt);
          item.classList.remove('selected');
        } else {
          selected.add(opt);
          item.classList.add('selected');
        }
        const arr = [...selected];
        setAnswer(idx, q.id, { value_options: arr.length ? arr : null });
        if (!q.required) enableNext();
        else document.getElementById('btn-next').disabled = selected.size === 0;
      };
      list.appendChild(item);
    });
    if (!q.required) document.getElementById('btn-next').disabled = false;
    container.appendChild(list);
  }

  // ─── Scale ───
  function renderScale(container, q, idx) {
    const max = q.scale_max || 5;
    const grid = document.createElement('div');
    grid.className = 'scale-grid';
    for (let i = 1; i <= max; i++) {
      const btn = document.createElement('button');
      btn.className = 'scale-btn';
      btn.textContent = i;
      btn.onclick = () => {
        grid.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        setAnswer(idx, q.id, { value_number: i });
        enableNext();
      };
      grid.appendChild(btn);
    }
    container.appendChild(grid);
  }

  // ─── Answer management ───
  function setAnswer(idx, questionId, vals) {
    answers[idx] = { question_id: questionId, ...vals };
  }

  function enableNext() {
    document.getElementById('btn-next').disabled = false;
  }

  // ─── Navigation ───
  function nextQuestion() {
    if (currentQIdx < questions.length - 1) {
      currentQIdx++;
      renderQuestion(currentQIdx);
    } else {
      submitAllAnswers();
    }
  }

  function prevQuestion() {
    if (currentQIdx > 0) {
      currentQIdx--;
      renderQuestion(currentQIdx);
      // Re-habilita o próximo se já havia resposta salva
      if (answers[currentQIdx]) enableNext();
    } else if (surveyData.intro_text) {
      showScreen('screen-intro');
      setProgress(5);
    }
  }

  // ─── Submit ───
  async function submitAllAnswers() {
    const btnNext = document.getElementById('btn-next');
    btnNext.disabled = true;
    btnNext.textContent = 'Enviando...';

    const token = linkData.token;

    // Build answers payload (exclude nulls from legacy placeholders)
    const answersPayload = answers.filter(Boolean).map(a => ({
      question_id: a.question_id,
      value_text:    a.value_text    ?? null,
      value_number:  a.value_number  ?? null,
      value_options: a.value_options ?? null,
    }));

    const res = await fetch(`${FUNCTIONS_URL}/submit-survey`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, answers: answersPayload }),
    });

    const result = await res.json();
    if (result.success) {
      showScreen('screen-thanks');
      setProgress(100);
    } else {
      const msgs = {
        token_already_used: 'Você já respondeu esta avaliação.',
        token_invalid: 'Link inválido ou expirado.',
        missing_fields: 'Dados incompletos. Tente novamente.',
      };
      showError('Erro ao enviar', msgs[result.error] || 'Tente novamente mais tarde.');
    }
  }

  // ─── Helpers ───
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showError(title, msg) {
    document.getElementById('error-title').textContent = title;
    document.getElementById('error-msg').textContent   = msg;
    showScreen('screen-error');
    setProgress(0);
  }

  function setProgress(pct) {
    document.getElementById('progress').style.width = pct + '%';
  }

  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
