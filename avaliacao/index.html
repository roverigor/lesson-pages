<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avaliação das Turmas · Academia Lendária</title>
  <link rel="stylesheet" href="../templates/design-tokens-dark-premium.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-bg-page); color: var(--color-text-body); font-family: var(--font-sans); min-height: 100vh; }

    .header { background: #111; border-bottom: 1px solid #1a1a1a; padding: 20px 24px; display: flex; align-items: center; gap: 12px; }
    .header-title { font-size: 18px; font-weight: 800; color: #fff; }
    .header-sub { font-size: 12px; color: #555; margin-top: 2px; }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }

    .section-title { font-size: 11px; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; margin-top: 32px; }

    /* OVERVIEW GRID */
    .overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 8px; }
    .ov-card { background: #111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 18px 20px; cursor: pointer; transition: border-color .15s; }
    .ov-card:hover { border-color: #333; }
    .ov-card.active { border-color: var(--c); }
    .ov-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--c); display: inline-block; margin-right: 6px; }
    .ov-name { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .ov-score { font-size: 32px; font-weight: 800; color: var(--c); line-height: 1; }
    .ov-score-label { font-size: 10px; color: #444; margin-top: 3px; }
    .ov-meta { font-size: 11px; color: #555; margin-top: 8px; }
    .score-bar { height: 3px; border-radius: 2px; background: #1a1a1a; margin-top: 8px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 2px; background: var(--c); transition: width .6s ease; }

    /* TURMA DETAIL */
    .turma-detail { display: none; margin-top: 8px; }
    .turma-detail.visible { display: block; }
    .detail-card { background: #111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; }
    .detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .detail-tag { font-size: 10px; padding: 3px 9px; border-radius: 999px; font-weight: 700; }

    /* METRICS ROW */
    .metrics-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .metric-pill { background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 110px; }
    .metric-pill-label { font-size: 10px; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .metric-pill-val { font-size: 22px; font-weight: 800; margin-top: 2px; }

    /* SESSIONS TABLE */
    .sessions-title { font-size: 11px; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
    .session-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #141414; }
    .session-row:last-child { border-bottom: none; }
    .session-date { font-size: 12px; color: #888; min-width: 80px; font-weight: 600; }
    .session-n { font-size: 11px; color: #444; min-width: 50px; }
    .session-scores { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
    .score-chip { font-size: 11px; padding: 3px 8px; border-radius: 5px; font-weight: 700; white-space: nowrap; }
    .score-chip.high  { background: rgba(74,222,128,.12); color: #4ade80; }
    .score-chip.mid   { background: rgba(245,158,11,.12); color: #f59e0b; }
    .score-chip.low   { background: rgba(239,68,68,.12); color: #f87171; }
    .session-salas { font-size: 10px; color: #444; }

    /* COMMENTS */
    .comments-toggle { background: none; border: 1px solid #1e1e1e; color: #666; font-size: 11px; padding: 5px 12px; border-radius: 6px; cursor: pointer; margin-top: 16px; }
    .comments-toggle:hover { border-color: #333; color: #999; }
    .comments-list { margin-top: 12px; display: none; }
    .comments-list.open { display: block; }
    .comment-item { background: #0d0d0d; border-left: 2px solid #222; padding: 10px 14px; margin-bottom: 8px; border-radius: 0 6px 6px 0; font-size: 12px; color: #888; line-height: 1.6; }

    /* SALAS BREAKDOWN (PS Advanced) */
    .salas-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid #141414; }
    .sala-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 9px; background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 999px; margin: 3px; }

    /* SENTIMENT */
    .sentiment-section { margin-top: 20px; padding-top: 18px; border-top: 1px solid #141414; }
    .sentiment-bars { display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-end; }
    .sent-bar-wrap { flex: 1; text-align: center; }
    .sent-bar-track { background: #0d0d0d; border-radius: 4px; height: 60px; position: relative; overflow: hidden; display: flex; align-items: flex-end; }
    .sent-bar-fill { width: 100%; border-radius: 4px; transition: height .6s ease; }
    .sent-bar-label { font-size: 10px; color: #555; margin-top: 5px; font-weight: 600; }
    .sent-bar-pct { font-size: 13px; font-weight: 800; margin-top: 2px; }
    .themes-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .theme-tag { font-size: 11px; padding: 3px 10px; border-radius: 999px; background: #0d0d0d; border: 1px solid #1e1e1e; color: #aaa; display: flex; align-items: center; gap: 5px; }
    .theme-count { background: #1a1a1a; border-radius: 999px; padding: 1px 6px; font-size: 10px; color: #555; font-weight: 700; }

    .btn-print { background: #1e1e2e; color: #a5b4fc; border: 1px solid #6366f130; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .btn-print:hover { background: #2a2a3e; }
    .no-print { }
    .print-header { display: none; }

    @media print {
      body { background: #fff !important; color: #000 !important; }
      .header, .no-print { display: none !important; }
      .container { padding: 0 !important; max-width: 100% !important; }
      .ov-card { border: 1px solid #ddd !important; background: #f9f9f9 !important; break-inside: avoid; }
      .ov-score { color: #000 !important; }
      .ov-name, .ov-meta, .ov-score-label { color: #333 !important; }
      .score-bar { background: #eee !important; }
      .turma-detail { display: block !important; }
      .detail-card { border: 1px solid #ddd !important; background: #fff !important; break-inside: avoid; margin-bottom: 24px; }
      .metric-pill { border: 1px solid #ddd !important; background: #f9f9f9 !important; }
      .metric-pill-label { color: #666 !important; }
      .metric-pill-val { color: #000 !important; }
      .session-date, .session-n { color: #333 !important; }
      .score-chip { border: 1px solid #ddd !important; }
      .score-chip.high  { background: #f0fdf4 !important; color: #166534 !important; }
      .score-chip.mid   { background: #fffbeb !important; color: #92400e !important; }
      .score-chip.low   { background: #fef2f2 !important; color: #991b1b !important; }
      .comment-item { background: #f9f9f9 !important; color: #333 !important; border-left-width: 3px !important; }
      .comments-list { display: block !important; }
      .comments-toggle { display: none !important; }
      .section-title, .sessions-title { color: #666 !important; }
      .sentiment-section { border-top: 1px solid #ddd !important; }
      .sent-bar-track { background: #eee !important; }
      .theme-tag { border: 1px solid #ddd !important; color: #333 !important; background: #f9f9f9 !important; }
      .theme-count { background: #eee !important; color: #666 !important; }
      .print-header { display: block !important; }
      .overview-grid { break-inside: avoid; }
    }

    @media (max-width: 600px) {
      .overview-grid { grid-template-columns: 1fr 1fr; }
      .metrics-row { gap: 6px; }
      .metric-pill { min-width: 80px; padding: 8px 10px; }
    }
  </style>
</head>

const KEYS = ['ps_advanced','ps_fund','fund_t3'];
const IDS  = {'ps_advanced':'detail-ps-advanced','ps_fund':'detail-ps-fund','fund_t3':'detail-fund-t3'};
let activeKey = null;

const NEG_WORDS = ['bagunçado','bagunça','demorou','falta de foco','foco','monopoliza','não resolveram','problema','desnivelado','perdido','básico','lento','perde','não conseguiu','ruim','mal ','pior','errado','confuso','atrasou','critica','crítica','fraco','falhou','frustr','inadequ','péssimo','deixou a desejar'];
const POS_WORDS = ['ótimo','excelente','fantástico','incrível','sensacional','parabéns','show','top','massa','maravilhoso','perfeito','muito bom','fenomenal','nota 1000','gratidão','obrigado','obrigada','adorei','amei','bacana','excepcional','didática','atencioso','insights','surreal','recomendo','valeu','ajudou','resolveu','tirou','aprendemos','salva','nota 10','nota1000'];
function commentSentiment(text) {
  const t = text.toLowerCase();
  const neg = NEG_WORDS.some(w => t.includes(w));
  const pos = POS_WORDS.some(w => t.includes(w));
  if (neg && !pos) return 'negativo';
  if (pos && !neg) return 'positivo';
  return 'neutro';
}

function scoreClass(v) {
  if (v === null || v === undefined) return '';
  return v >= 4.5 ? 'high' : v >= 3.5 ? 'mid' : 'low';
}

function avg(sessions, metric) {
  const vals = sessions.map(s => s[metric]).filter(v => v !== null && v !== undefined);
  return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : null;
}

function mainMetric(key) {
  const d = DATA[key];
  return d.metrics[0];
}

function fmtDate(iso) {
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y.slice(2)}`;
}

function totalN(sessions) {
  return sessions.reduce((a,s)=>a+s.n,0);
}

// ── OVERVIEW CARDS ────────────────────────────────────────────────
function renderOverview() {
  const grid = document.getElementById('overview-grid');
  grid.innerHTML = KEYS.map(key => {
    const d = DATA[key];
    const m = mainMetric(key);
    const score = avg(d.sessions, m);
    const pct = score ? Math.round((score/5)*100) : 0;
    const sc = scoreClass(score);
    const colorMap = {high:'#4ade80', mid:'#f59e0b', low:'#f87171'};
    const barColor = colorMap[sc] || d.color;
    const typeLabel = d.type === 'csat' ? 'CSAT Aulas' : 'NPS Pronto-Socorro';
    const n = totalN(d.sessions);
    return `
      <div class="ov-card" id="ov-${key}" style="--c:${d.color}" onclick="toggleDetail('${key}')">
        <div class="ov-name"><span class="ov-dot"></span>${d.name}</div>
        <div class="ov-score">${score !== null ? score.toFixed(2) : '—'}</div>
        <div class="ov-score-label">${d.labels[m]} · média geral</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        <div class="ov-meta">${d.sessions.length} sessões · ${n} respostas · ${typeLabel}</div>
        <div style="font-size:10px;color:#333;margin-top:6px;text-align:right" data-chevron>▼ ver detalhes</div>
      </div>`;
  }).join('');
}

// ── TURMA DETAIL ──────────────────────────────────────────────────
function renderDetail(key) {
  const d = DATA[key];
  const detailEl = document.getElementById(IDS[key]);

  // Avg per metric
  const metricsHtml = d.metrics.map(m => {
    const a = avg(d.sessions, m);
    const sc = scoreClass(a);
    const colorMap = {high:'#4ade80', mid:'#f59e0b', low:'#f87171'};
    const col = colorMap[sc] || d.color;
    return `<div class="metric-pill">
      <div class="metric-pill-label">${d.labels[m]}</div>
      <div class="metric-pill-val" style="color:${col}">${a !== null ? a.toFixed(2) : '—'}</div>
    </div>`;
  }).join('');

  // Sessions
  const sessionsHtml = d.sessions.map(s => {
    const scores = d.metrics.map(m => {
      const v = s[m];
      if (v === null || v === undefined) return '';
      const sc = scoreClass(v);
      return `<span class="score-chip ${sc}">${d.labels[m]}: ${v}</span>`;
    }).join('');

    const salasHtml = s.salas && Object.keys(s.salas).length > 0
      ? Object.entries(s.salas).map(([sala, cnt]) => `<span class="sala-badge">🏠 ${sala} (${cnt})</span>`).join('')
      : '';

    const turmaBadge = s.turma ? `<span style="font-size:9px;padding:1px 6px;border-radius:4px;background:#1a1a1a;color:#555;font-weight:700;margin-left:4px">${s.turma}</span>` : '';
    return `<div class="session-row">
      <div class="session-date">${fmtDate(s.date)}${turmaBadge}</div>
      <div class="session-n">${s.n} resp.</div>
      <div class="session-scores">${scores}${salasHtml ? `<div class="session-salas" style="width:100%;margin-top:4px">${salasHtml}</div>` : ''}</div>
    </div>`;
  }).join('');

  // All comments
  const allComments = d.sessions.flatMap(s => (s.comentarios || []).map(c => ({date: s.date, text: c})));
  const commentsHtml = allComments.length > 0
    ? `<button class="comments-toggle" onclick="toggleComments('${key}')">💬 Ver ${allComments.length} comentários</button>
       <div class="comments-list" id="comments-${key}">
         ${allComments.map(c => {
           const sent = commentSentiment(c.text);
           const borderColor = sent === 'negativo' ? '#f87171' : sent === 'positivo' ? '#4ade8030' : '#222';
           const indicator = sent === 'negativo' ? '<span style="font-size:9px;background:rgba(248,113,113,.12);color:#f87171;padding:1px 6px;border-radius:4px;margin-right:6px;font-weight:700">⚠ negativo</span>' : '';
           return `<div class="comment-item" style="border-left-color:${borderColor}"><span style="font-size:10px;color:#444;font-weight:600;margin-right:8px">${fmtDate(c.date)}</span>${indicator}${esc(c.text)}</div>`;
         }).join('')}
       </div>`
    : '';

  // Sentiment section
  const sent = SENTIMENT[key];
  let sentHtml = '';
  if (sent) {
    const maxVal = Math.max(sent.positivo, sent.negativo, sent.neutro) || 1;
    const bars = [
      {label:'Positivos', val: sent.positivo, color:'#4ade80'},
      {label:'Neutros',   val: sent.neutro,   color:'#888'},
      {label:'Negativos', val: sent.negativo, color:'#f87171'},
    ].map(b => {
      const h = Math.round((b.val/maxVal)*60);
      const pct = sent.total ? Math.round(b.val/sent.total*100) : 0;
      return `<div class="sent-bar-wrap">
        <div class="sent-bar-track"><div class="sent-bar-fill" style="height:${h}px;background:${b.color}20;border:1px solid ${b.color}40"></div></div>
        <div class="sent-bar-pct" style="color:${b.color}">${pct}%</div>
        <div class="sent-bar-label">${b.label}<br><span style="color:#333">${b.val}</span></div>
      </div>`;
    }).join('');
    const themes = Object.entries(sent.temas).map(([t, n]) =>
      `<span class="theme-tag">${t}<span class="theme-count">${n}</span></span>`
    ).join('');
    sentHtml = `<div class="sentiment-section">
      <div class="sessions-title">Análise de sentimentos · campos abertos</div>
      <div style="font-size:11px;color:#444;margin-bottom:12px">${sent.total} comentários analisados</div>
      <div class="sentiment-bars">${bars}</div>
      <div class="sessions-title" style="margin-top:14px">Principais temas mencionados</div>
      <div class="themes-wrap">${themes}</div>
    </div>`;
  }

  const typeLabel = d.type === 'csat' ? 'CSAT Aulas' : 'NPS Pronto-Socorro';
  const typeBg = d.type === 'csat' ? 'rgba(236,72,153,.12)' : 'rgba(99,102,241,.12)';
  const typeColor = d.type === 'csat' ? '#ec4899' : '#a5b4fc';

  detailEl.innerHTML = `
    <div class="detail-card" style="border-color:${d.color}22">
      <div class="detail-header">
        <div style="width:10px;height:10px;border-radius:50%;background:${d.color};flex-shrink:0"></div>
        <div style="font-size:16px;font-weight:800;color:#fff">${d.name}</div>
        <span class="detail-tag" style="background:${typeBg};color:${typeColor}">${typeLabel}</span>
        <div style="margin-left:auto;font-size:11px;color:#444">${totalN(d.sessions)} respostas · ${d.sessions.length} sessões</div>
      </div>
      <div class="section-title" style="margin-top:0">Médias gerais</div>
      <div class="metrics-row">${metricsHtml}</div>
      <div class="sessions-title">Por sessão</div>
      ${sessionsHtml}
      ${sentHtml}
      ${commentsHtml}
    </div>`;
}

function toggleDetail(key) {
  const detailEl = document.getElementById(IDS[key]);
  const card = document.getElementById('ov-'+key);

  if (activeKey === key) {
    detailEl.classList.remove('visible');
    card.classList.remove('active');
    card.querySelector('[data-chevron]').textContent = '▼ ver detalhes';
    activeKey = null;
    return;
  }

  // Close previous
  if (activeKey) {
    document.getElementById(IDS[activeKey]).classList.remove('visible');
    const prev = document.getElementById('ov-'+activeKey);
    prev.classList.remove('active');
    prev.querySelector('[data-chevron]').textContent = '▼ ver detalhes';
  }

  renderDetail(key);
  detailEl.classList.add('visible');
  card.classList.add('active');
  card.querySelector('[data-chevron]').textContent = '▲ fechar';
  activeKey = key;

  // Scroll to detail
  setTimeout(() => detailEl.scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
}

function toggleComments(key) {
  const el = document.getElementById('comments-'+key);
  const btn = el.previousElementSibling;
  const isOpen = el.classList.toggle('open');
  btn.textContent = isOpen ? '💬 Ocultar comentários' : `💬 Ver comentários`;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function printAll() {
  // Expande todos os detalhes e comentários antes de imprimir
  KEYS.forEach(key => {
    renderDetail(key);
    document.getElementById(IDS[key]).classList.add('visible');
    const commentsEl = document.getElementById('comments-' + key);
    if (commentsEl) commentsEl.classList.add('open');
  });
  document.getElementById('print-subtitle').textContent =
    `Gerado em ${new Date().toLocaleDateString('pt-BR')} · ${KEYS.length} turmas avaliadas`;
  setTimeout(() => window.print(), 150);
}

// ─── Live DB Surveys ───
(async function loadLiveSurveys() {
  const SUPABASE_URL = window.SUPABASE_CONFIG.url;
  const SUPABASE_KEY = window.SUPABASE_CONFIG.anonKey;

  let sb;
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  } catch(e) { return; } // supabase sdk not loaded yet

  const { data: surveys } = await sb
    .from('surveys')
    .select('id, name, type, status, cohorts(name), classes(name)')
    .in('status', ['active', 'closed'])
    .order('created_at', { ascending: false });

  if (!surveys || surveys.length === 0) return;

  const { data: responses } = await sb
    .from('student_nps')
    .select('survey_id, score, feedback, responded_at')
    .in('survey_id', surveys.map(s => s.id));

  const responsesBySurvey = {};
  for (const r of (responses || [])) {
    if (!responsesBySurvey[r.survey_id]) responsesBySurvey[r.survey_id] = [];
    responsesBySurvey[r.survey_id].push(r);
  }

  document.getElementById('live-surveys-section').style.display = '';
  document.getElementById('legacy-section-title').style.display = 'none';

  const COLORS = ['#6366f1','#10b981','#f59e0b','#ec4899','#06b6d4','#8b5cf6'];
  let activeLiveKey = null;

  const cards = surveys.map((s, i) => {
    const r = responsesBySurvey[s.id] || [];
    const color = COLORS[i % COLORS.length];
    const turma = s.cohorts?.name || s.classes?.name || '—';

    let scoreDisplay = '—';
    if (r.length > 0) {
      if (s.type === 'nps') {
        const prom = r.filter(x => x.score >= 9).length;
        const detr = r.filter(x => x.score <= 6).length;
        scoreDisplay = Math.round(((prom - detr) / r.length) * 100);
      } else {
        scoreDisplay = (r.reduce((a, x) => a + x.score, 0) / r.length).toFixed(1);
      }
    }

    const pct = r.length > 0 ? Math.min(100, Math.abs(scoreDisplay) / (s.type === 'nps' ? 1 : 20) * 100) : 0;

    return `<div class="ov-card" style="--c:${color}" onclick="toggleLiveDetail('${s.id}')">
      <div class="ov-name"><span class="ov-dot"></span>${s.name}</div>
      <div class="ov-score">${scoreDisplay}</div>
      <div class="ov-score-label">${s.type === 'nps' ? 'NPS Score' : 'CSAT Média'}</div>
      <div class="ov-meta">${turma} · ${r.length} respostas</div>
      <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  document.getElementById('live-overview-grid').innerHTML = cards;

  window.toggleLiveDetail = function(surveyId) {
    const s = surveys.find(x => x.id === surveyId);
    if (!s) return;
    const r = responsesBySurvey[surveyId] || [];

    if (activeLiveKey === surveyId) {
      activeLiveKey = null;
      document.getElementById('live-details').innerHTML = '';
      return;
    }
    activeLiveKey = surveyId;

    const comments = r.filter(x => x.feedback).map(x =>
      `<div class="comment-item">${x.feedback}</div>`
    ).join('') || '<div style="color:#444;font-size:12px;padding:8px 0">Nenhum comentário.</div>';

    let scoreSection = '';
    if (r.length > 0 && s.type === 'nps') {
      const prom = r.filter(x => x.score >= 9).length;
      const neut = r.filter(x => x.score >= 7 && x.score <= 8).length;
      const detr = r.filter(x => x.score <= 6).length;
      const nps  = Math.round(((prom - detr) / r.length) * 100);
      const color = nps >= 50 ? '#4ade80' : nps >= 0 ? '#f59e0b' : '#f87171';
      scoreSection = `
        <div class="metrics-row">
          <div class="metric-pill"><div class="metric-pill-label">NPS Score</div><div class="metric-pill-val" style="color:${color}">${nps}</div></div>
          <div class="metric-pill"><div class="metric-pill-label">Promotores</div><div class="metric-pill-val" style="color:#4ade80">${prom}</div></div>
          <div class="metric-pill"><div class="metric-pill-label">Neutros</div><div class="metric-pill-val" style="color:#f59e0b">${neut}</div></div>
          <div class="metric-pill"><div class="metric-pill-label">Detratores</div><div class="metric-pill-val" style="color:#f87171">${detr}</div></div>
        </div>`;
    } else if (r.length > 0 && s.type === 'csat') {
      const avg = (r.reduce((a, x) => a + x.score, 0) / r.length).toFixed(1);
      scoreSection = `<div class="metrics-row">
        <div class="metric-pill"><div class="metric-pill-label">Média CSAT</div><div class="metric-pill-val" style="color:#f59e0b">${avg}/5</div></div>
        <div class="metric-pill"><div class="metric-pill-label">Respostas</div><div class="metric-pill-val">${r.length}</div></div>
      </div>`;
    }

    const turma = s.cohorts?.name || s.classes?.name || '—';
    document.getElementById('live-details').innerHTML = `
      <div class="turma-detail visible">
        <div class="detail-card">
          <div class="detail-header">
            <span style="font-size:15px;font-weight:700;color:#fff">${s.name}</span>
            <span class="detail-tag" style="background:rgba(99,102,241,.12);color:#a5b4fc">${turma}</span>
            <span class="detail-tag" style="background:rgba(99,102,241,.08);color:#666">${s.type.toUpperCase()}</span>
          </div>
          ${scoreSection}
          <div class="sessions-title">Comentários (${r.filter(x=>x.feedback).length})</div>
          <div class="comments-list open">${comments}</div>
        </div>
      </div>`;
  };
})();
</script>
