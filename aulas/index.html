<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aulas e Gravacoes — Academia Lendaria</title>
  <link rel="stylesheet" href="../templates/design-tokens-dark-premium.css">
  <link rel="stylesheet" href="../templates/login-overlay.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-sans); background: #080808; color: #888; min-height: 100vh; }

    .header { background: #101010; border-bottom: 1px solid #1a1a1a; padding: 20px 32px; position: sticky; top: 0; z-index: 200; }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .header-title { display: flex; align-items: center; gap: 12px; flex: 1; }
    .header-icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .header-title h1 { font-size: 18px; font-weight: 800; color: #fff; }
    .header-title p { font-size: 12px; color: #444; margin-top: 1px; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); border-radius: 999px; padding: 8px 16px; font-size: 12px; font-weight: 600; color: #a5b4fc; text-decoration: none; display: flex; align-items: center; gap: 6px; cursor: pointer; white-space: nowrap; }
    .pill:hover { background: rgba(99,102,241,0.2); }
    .pill.danger { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.25); color: #fca5a5; }

    .layout { max-width: 1200px; margin: 0 auto; padding: 28px 32px 120px; }

    /* Cohort selector */
    .cohort-tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
    .cohort-tab { padding: 10px 20px; border-radius: 10px; border: 1px solid #1e1e1e; background: #0d0d0d; color: #555; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); transition: all 0.15s; }
    .cohort-tab:hover { color: #aaa; border-color: #333; }
    .cohort-tab.active { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.3); color: #a5b4fc; }

    /* Recording card */
    .recording-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 14px; margin-bottom: 20px; overflow: hidden; }
    .card-header { padding: 20px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #141414; }
    .card-date { font-size: 11px; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .card-title { font-size: 18px; font-weight: 800; color: #fff; flex: 1; }
    .card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
    .badge-purple { background: rgba(99,102,241,0.12); color: #a5b4fc; }
    .badge-green { background: rgba(34,197,94,0.12); color: #4ade80; }
    .badge-yellow { background: rgba(245,158,11,0.12); color: #fbbf24; }

    .card-meta { padding: 16px 24px; display: flex; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid #141414; }
    .meta-item { font-size: 12px; color: #555; display: flex; align-items: center; gap: 6px; }
    .meta-value { color: #aaa; font-weight: 600; }

    .card-links { padding: 16px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #141414; }
    .link-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #222; background: #111; color: #aaa; font-size: 12px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: all 0.15s; cursor: pointer; font-family: var(--font-sans); }
    .link-btn:hover { background: #1a1a1a; color: #fff; }
    .link-btn.primary { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.25); color: #a5b4fc; }
    .link-btn.green { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.2); color: #4ade80; }

    /* Materiais */
    .materials-list { padding: 0; list-style: none; margin: 8px 0; }
    .material-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #111; }
    .material-item:last-child { border-bottom: none; }
    .material-name { flex: 1; font-size: 13px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .material-type { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: #1a1a1a; color: #666; flex-shrink: 0; }
    .material-btn { padding: 5px 10px; border-radius: 6px; border: 1px solid #222; background: transparent; color: #666; font-size: 11px; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .material-btn:hover { color: #ccc; background: #1a1a1a; }
    .material-btn.danger:hover { color: #f87171; border-color: rgba(239,68,68,0.3); }
    .upload-area { border: 1px dashed #2a2a2a; border-radius: 8px; padding: 12px; margin-top: 10px; text-align: center; }
    .upload-input { display: none; }
    .upload-label { font-size: 12px; color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .upload-label:hover { color: #a5b4fc; }

    /* Completude Admin */
    .completeness-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px; margin-bottom: 12px; }
    .comp-row { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid #111; }
    .comp-row:last-child { border-bottom: none; }
    .comp-date { font-size: 12px; color: #555; font-weight: 600; flex-shrink: 0; min-width: 80px; }
    .comp-title { flex: 1; font-size: 13px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .comp-badges { display: flex; gap: 6px; flex-shrink: 0; }
    .comp-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; white-space: nowrap; }
    .comp-badge.ok { background: rgba(34,197,94,0.1); color: #4ade80; }
    .comp-badge.missing { background: rgba(239,68,68,0.08); color: #555; }

    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 2000; transition: all 0.3s; transform: translateY(80px); opacity: 0; font-family: var(--font-sans); }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #052e16; border: 1px solid #166534; color: #4ade80; }
    .toast.error { background: #2d0a0a; border: 1px solid #7f1d1d; color: #f87171; }

    /* Sections */
    .card-sections { padding: 0 24px 24px; }
    .section { margin-top: 20px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 12px 0; border-bottom: 1px solid #141414; }
    .section-title { font-size: 14px; font-weight: 700; color: #ddd; }
    .section-toggle { font-size: 11px; color: #555; font-weight: 600; padding: 4px 10px; border-radius: 6px; background: #111; border: 1px solid #1e1e1e; }
    .section-body { display: none; padding: 16px 0; }
    .section-body.open { display: block; }

    .summary-content { font-size: 13px; line-height: 1.8; color: #aaa; }
    .summary-content h2 { font-size: 16px; font-weight: 800; color: #fff; margin: 20px 0 8px; }
    .summary-content h3 { font-size: 14px; font-weight: 700; color: #ddd; margin: 16px 0 6px; }
    .summary-content strong { color: #ddd; }
    .summary-content ul, .summary-content ol { padding-left: 20px; margin: 8px 0; }
    .summary-content li { margin: 4px 0; }
    .summary-content table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    .summary-content th { text-align: left; padding: 8px 12px; font-size: 11px; color: #555; border-bottom: 1px solid #1e1e1e; background: #0a0a0a; }
    .summary-content td { padding: 8px 12px; font-size: 12px; color: #aaa; border-bottom: 1px solid #111; }

    .transcript-content { font-size: 12px; line-height: 1.7; color: #666; white-space: pre-wrap; font-family: 'SF Mono', 'Fira Code', monospace; max-height: 500px; overflow-y: auto; background: #0a0a0a; border-radius: 8px; padding: 16px; }
    .chat-content { font-size: 12px; line-height: 1.7; color: #888; white-space: pre-wrap; max-height: 300px; overflow-y: auto; background: #0a0a0a; border-radius: 8px; padding: 16px; }

    .empty { text-align: center; padding: 60px 20px; color: #333; font-size: 14px; }

    @media (max-width: 768px) {
      .header { padding: 14px 16px; }
      .layout { padding: 16px 12px 80px; }
      .card-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-icon">🎓</div>
    <div class="login-title">Aulas e Gravacoes</div>
    <div class="login-subtitle">Transcricoes, resumos e materiais por turma</div>
    <form onsubmit="handleLogin(event)">
      <input class="login-field" type="email" id="login-email" placeholder="Email" required>
      <input class="login-field" type="password" id="login-password" placeholder="Senha" required>
      <button class="login-btn" type="submit">Entrar</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<header class="header" id="app-header" style="display:none">
  <div class="header-inner">
    <div class="header-title">
      <div class="header-icon">🎓</div>
      <div>
        <h1>Aulas e Gravacoes</h1>
        <p>Transcricoes, resumos e materiais por turma</p>
      </div>
    </div>
    <div class="header-actions">
      <a href="/" class="pill">Home</a>
      <a href="/presenca" class="pill">Presenca</a>
      <a href="/alunos" class="pill">Alunos</a>
      <a href="/calendario/admin" class="pill">Admin</a>
      <span class="pill danger" onclick="handleLogout()">Sair</span>
    </div>
  </div>
</header>

<div class="layout" id="app-main" style="display:none">
  <!-- View tabs -->
  <div style="display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap">
    <button id="tab-aulas" class="cohort-tab active" onclick="setMainTab('aulas')">🎬 Aulas e Gravações</button>
    <button id="tab-completeness" class="cohort-tab" onclick="setMainTab('completeness')">📊 Completude (Admin)</button>
  </div>

  <!-- Aulas view -->
  <div id="aulas-view">
    <div class="cohort-tabs" id="cohort-tabs"></div>
    <div id="recordings-list"></div>
  </div>

  <!-- Completeness dashboard view (Story 10.5) -->
  <div id="completeness-view" style="display:none">
    <div style="margin-bottom:20px">
      <div class="cohort-tabs" id="comp-cohort-tabs"></div>
    </div>
    <div id="completeness-stats" style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap"></div>
    <div id="completeness-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/config.js"></script>
<script src="../templates/utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script>
const SUPABASE_URL = window.SUPABASE_CONFIG.url;
const SUPABASE_KEY = window.SUPABASE_CONFIG.anonKey;
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let recordings = [];
let cohorts = [];
let materials = {}; // { recording_id: [material...] }
let currentCohort = 'all';
let currentCompCohort = 'all';
let currentMainTab = 'aulas';

// handleLogin provided by utils.js
async function handleLogout() { await sb.auth.signOut(); location.reload(); }
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showApp();
}

async function showApp() {
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('app-header').style.display = '';
  document.getElementById('app-main').style.display = '';
  await loadData();
}

async function loadData() {
  const [r, c, m] = await Promise.all([
    sb.from('class_recordings').select('*, cohorts(name, tally_url, zoom_link, time_start, time_end, schedule_days)').order('recording_date', { ascending: false }),
    sb.from('cohorts').select('*').order('name'),
    sb.from('class_materials').select('*').order('uploaded_at', { ascending: true }),
  ]);
  recordings = r.data || [];
  cohorts = c.data || [];
  // Index materials by recording_id
  materials = {};
  for (const mat of (m.data || [])) {
    if (!materials[mat.recording_id]) materials[mat.recording_id] = [];
    materials[mat.recording_id].push(mat);
  }
  renderCohortTabs();
  renderRecordings();
  renderCompCohortTabs();
}

function setMainTab(tab) {
  currentMainTab = tab;
  document.getElementById('aulas-view').style.display = tab === 'aulas' ? '' : 'none';
  document.getElementById('completeness-view').style.display = tab === 'completeness' ? '' : 'none';
  document.getElementById('tab-aulas').classList.toggle('active', tab === 'aulas');
  document.getElementById('tab-completeness').classList.toggle('active', tab === 'completeness');
  if (tab === 'completeness') renderCompleteness();
}

function renderCohortTabs() {
  const el = document.getElementById('cohort-tabs');
  const cohortsWithRecordings = new Set(recordings.map(r => r.cohort_id).filter(Boolean));
  const relevantCohorts = cohorts.filter(c => cohortsWithRecordings.has(c.id));

  el.innerHTML = `<button class="cohort-tab ${currentCohort === 'all' ? 'active' : ''}" onclick="setCohort('all')">Todas</button>` +
    relevantCohorts.map(c =>
      `<button class="cohort-tab ${currentCohort === c.id ? 'active' : ''}" onclick="setCohort('${c.id}')">${c.name}</button>`
    ).join('');
}

function setCohort(id) {
  currentCohort = id;
  renderCohortTabs();
  renderRecordings();
}

function renderRecordings() {
  const el = document.getElementById('recordings-list');
  let filtered = recordings;
  if (currentCohort !== 'all') {
    filtered = recordings.filter(r => r.cohort_id === currentCohort);
  }

  if (!filtered.length) {
    el.innerHTML = '<div class="empty">Nenhuma gravacao encontrada</div>';
    return;
  }

  el.innerHTML = filtered.map((r, idx) => {
    const cohort = r.cohorts || {};
    const date = r.recording_date ? new Date(r.recording_date + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' }) : '—';
    const hasSummary = r.summary && r.summary.length > 10;
    const hasTranscript = r.transcript_text && r.transcript_text.length > 10;
    const hasChat = r.chat_log && r.chat_log.length > 5;
    const hasVtt = r.transcript_vtt && r.transcript_vtt.length > 10;

    // Parse markdown summary
    const summaryHtml = hasSummary ? (typeof marked !== 'undefined' ? marked.parse(r.summary) : r.summary.replace(/\n/g, '<br>')) : '';

    return `
    <div class="recording-card">
      <div class="card-header">
        <div style="flex:1">
          <div class="card-date">${date}</div>
          <div class="card-title">${r.title || '—'}</div>
        </div>
        <div class="card-badges">
          <span class="badge badge-purple">${cohort.name || '—'}</span>
          ${r.duration_minutes ? `<span class="badge badge-yellow">${r.duration_minutes} min</span>` : ''}
          ${hasSummary ? '<span class="badge badge-green">Resumo</span>' : ''}
          ${hasTranscript ? '<span class="badge badge-green">Transcricao</span>' : ''}
        </div>
      </div>

      <div class="card-meta">
        ${cohort.time_start ? `<div class="meta-item">Horario: <span class="meta-value">${cohort.time_start} - ${cohort.time_end || ''}</span></div>` : ''}
        ${cohort.schedule_days ? `<div class="meta-item">Dias: <span class="meta-value">${cohort.schedule_days}</span></div>` : ''}
        ${r.duration_minutes ? `<div class="meta-item">Duracao: <span class="meta-value">${r.duration_minutes} min</span></div>` : ''}
        ${hasTranscript ? `<div class="meta-item">Transcricao: <span class="meta-value">${Math.round(r.transcript_text.length / 1000)}k chars</span></div>` : ''}
      </div>

      <div class="card-links">
        ${cohort.zoom_link ? `<a href="${cohort.zoom_link}" target="_blank" class="link-btn primary">Zoom</a>` : ''}
        ${r.video_url ? `<a href="${r.video_url}" target="_blank" class="link-btn">Video</a>` : ''}
        ${r.audio_url ? `<a href="${r.audio_url}" target="_blank" class="link-btn">Audio</a>` : ''}
        ${cohort.tally_url ? `<a href="${cohort.tally_url}" target="_blank" class="link-btn green">CSAT</a>` : ''}
      </div>

      <div class="card-sections">
        <!-- Materiais (Story 10.3) -->
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <span class="section-title">📎 Materiais${(materials[r.id]||[]).length > 0 ? ` (${materials[r.id].length})` : ''}</span>
            <span class="section-toggle">${(materials[r.id]||[]).length > 0 ? 'Expandir' : 'Adicionar'}</span>
          </div>
          <div class="section-body ${(materials[r.id]||[]).length > 0 ? 'open' : ''}">
            <ul class="materials-list" id="mats-${r.id}">
              ${(materials[r.id]||[]).map(mat => `
              <li class="material-item">
                <span class="material-type">${(mat.file_type || 'arquivo').toUpperCase()}</span>
                <span class="material-name" title="${escapeHtml(mat.file_name)}">${escapeHtml(mat.file_name)}</span>
                <a href="${mat.file_url}" target="_blank" class="material-btn">Abrir</a>
                <button class="material-btn danger" onclick="removeMaterial('${mat.id}','${r.id}')">✕</button>
              </li>`).join('')}
            </ul>
            <div class="upload-area">
              <input class="upload-input" type="file" id="upload-${r.id}" accept=".pdf,.pptx,.ppt,.key,.png,.jpg,.jpeg"
                onchange="uploadMaterial('${r.id}', this)">
              <label class="upload-label" for="upload-${r.id}">
                ＋ Adicionar material (PDF, PPTX, imagem — máx. 50 MB)
              </label>
            </div>
          </div>
        </div>

        ${hasSummary ? `
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <span class="section-title">📝 Resumo da Aula</span>
            <span class="section-toggle">Expandir</span>
          </div>
          <div class="section-body open">
            <div class="summary-content">${summaryHtml}</div>
          </div>
        </div>` : ''}

        ${hasTranscript ? `
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <span class="section-title">Transcricao Completa</span>
            <span class="section-toggle">Expandir</span>
          </div>
          <div class="section-body">
            <div class="transcript-content">${escapeHtml(r.transcript_text)}</div>
          </div>
        </div>` : ''}

        ${hasVtt ? `
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <span class="section-title">Transcricao com Timestamps (VTT)</span>
            <span class="section-toggle">Expandir</span>
          </div>
          <div class="section-body">
            <div class="transcript-content">${escapeHtml(r.transcript_vtt)}</div>
          </div>
        </div>` : ''}

        ${hasChat ? `
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <span class="section-title">Chat da Aula</span>
            <span class="section-toggle">Expandir</span>
          </div>
          <div class="section-body">
            <div class="chat-content">${escapeHtml(r.chat_log)}</div>
          </div>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.section-toggle');
  body.classList.toggle('open');
  toggle.textContent = body.classList.contains('open') ? 'Recolher' : 'Expandir';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ─── Materials (Story 10.3) ──────────────────────────────────────────────────
async function uploadMaterial(recordingId, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 50 * 1024 * 1024) { showToast('Arquivo muito grande (máx. 50 MB)', 'error'); return; }

  const allowed = ['application/pdf','application/vnd.ms-powerpoint',
    'application/vnd.openxmlformats-officedocument.presentationml.presentation',
    'image/png','image/jpeg','image/jpg'];
  if (!allowed.includes(file.type) && !file.name.match(/\.(pdf|pptx?|key|png|jpe?g)$/i)) {
    showToast('Tipo de arquivo não permitido', 'error'); return;
  }

  showToast('Enviando...', 'success');
  const path = `${recordingId}/${Date.now()}_${file.name}`;
  const { data: upload, error: upErr } = await sb.storage.from('class-materials').upload(path, file);
  if (upErr) { showToast('Erro no upload: ' + upErr.message, 'error'); return; }

  const { data: { publicUrl } } = sb.storage.from('class-materials').getPublicUrl(path);
  const ext = file.name.split('.').pop()?.toLowerCase() || 'arquivo';

  const { data: mat, error: dbErr } = await sb.from('class_materials').insert({
    recording_id: recordingId,
    file_name: file.name,
    file_url: publicUrl,
    file_type: ext,
    file_size: file.size,
    uploaded_by: 'admin',
  }).select().single();

  if (dbErr) { showToast('Erro ao salvar material: ' + dbErr.message, 'error'); return; }

  // Update local cache and re-render the list
  if (!materials[recordingId]) materials[recordingId] = [];
  materials[recordingId].push(mat);
  const list = document.getElementById(`mats-${recordingId}`);
  if (list) {
    const li = document.createElement('li');
    li.className = 'material-item';
    li.innerHTML = `<span class="material-type">${ext.toUpperCase()}</span>
      <span class="material-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</span>
      <a href="${publicUrl}" target="_blank" class="material-btn">Abrir</a>
      <button class="material-btn danger" onclick="removeMaterial('${mat.id}','${recordingId}')">✕</button>`;
    list.appendChild(li);
  }
  input.value = '';
  showToast('Material adicionado!', 'success');
}

async function removeMaterial(materialId, recordingId) {
  const { error } = await sb.from('class_materials').delete().eq('id', materialId);
  if (error) { showToast('Erro ao remover: ' + error.message, 'error'); return; }
  materials[recordingId] = (materials[recordingId] || []).filter(m => m.id !== materialId);
  const item = document.querySelector(`button[onclick="removeMaterial('${materialId}','${recordingId}')"]`)?.closest('.material-item');
  if (item) item.remove();
  showToast('Material removido', 'success');
}

// ─── Completeness Dashboard (Story 10.5) ─────────────────────────────────────
function renderCompCohortTabs() {
  const el = document.getElementById('comp-cohort-tabs');
  if (!el) return;
  const cohortsWithData = cohorts.filter(c =>
    recordings.some(r => r.cohort_id === c.id)
  );
  el.innerHTML = `<button class="cohort-tab ${currentCompCohort === 'all' ? 'active' : ''}" onclick="setCompCohort('all')">Todas</button>` +
    cohortsWithData.map(c =>
      `<button class="cohort-tab ${currentCompCohort === c.id ? 'active' : ''}" onclick="setCompCohort('${c.id}')">${c.name}</button>`
    ).join('');
}

function setCompCohort(id) {
  currentCompCohort = id;
  renderCompCohortTabs();
  renderCompleteness();
}

function renderCompleteness() {
  const statEl = document.getElementById('completeness-stats');
  const listEl = document.getElementById('completeness-list');
  if (!statEl || !listEl) return;

  let filtered = recordings;
  if (currentCompCohort !== 'all') {
    filtered = recordings.filter(r => r.cohort_id === currentCompCohort);
  }

  const total = filtered.length;
  const withVideo = filtered.filter(r => r.video_url).length;
  const withSummary = filtered.filter(r => r.summary && r.summary.length > 10).length;
  const withMaterials = filtered.filter(r => (materials[r.id] || []).length > 0).length;
  const pct = total > 0 ? Math.round(withVideo / total * 100) : 0;

  statEl.innerHTML = `
    <div style="background:#101010;border:1px solid #1a1a1a;border-radius:10px;padding:14px 20px;flex:1;min-width:140px">
      <div style="font-size:24px;font-weight:800;color:#fff">${withVideo}/${total}</div>
      <div style="font-size:11px;color:#444;margin-top:2px">Aulas com gravação — ${pct}%</div>
    </div>
    <div style="background:#101010;border:1px solid #1a1a1a;border-radius:10px;padding:14px 20px;flex:1;min-width:140px">
      <div style="font-size:24px;font-weight:800;color:#a5b4fc">${withSummary}</div>
      <div style="font-size:11px;color:#444;margin-top:2px">Aulas com resumo IA</div>
    </div>
    <div style="background:#101010;border:1px solid #1a1a1a;border-radius:10px;padding:14px 20px;flex:1;min-width:140px">
      <div style="font-size:24px;font-weight:800;color:#4ade80">${withMaterials}</div>
      <div style="font-size:11px;color:#444;margin-top:2px">Aulas com materiais</div>
    </div>`;

  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty">Nenhuma aula encontrada para esta turma</div>';
    return;
  }

  listEl.innerHTML = `<div class="completeness-card">` +
    filtered.map(r => {
      const date = r.recording_date
        ? new Date(r.recording_date + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' })
        : '—';
      const hasMats = (materials[r.id] || []).length > 0;
      return `<div class="comp-row">
        <span class="comp-date">${date}</span>
        <span class="comp-title">${escapeHtml(r.title || '—')}</span>
        <div class="comp-badges">
          <span class="comp-badge ${r.video_url ? 'ok' : 'missing'}">${r.video_url ? '🎬 Sim' : '🎬 —'}</span>
          <span class="comp-badge ${r.summary ? 'ok' : 'missing'}">${r.summary ? '📝 Sim' : '📝 —'}</span>
          <span class="comp-badge ${hasMats ? 'ok' : 'missing'}">${hasMats ? `📎 ${materials[r.id].length}` : '📎 —'}</span>
        </div>
      </div>`;
    }).join('') +
    `</div>`;
}

checkSession();
</script>
