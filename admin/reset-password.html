<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir senha · Painel Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 36px 32px; width: 100%; max-width: 380px; }
  .icon { font-size: 36px; text-align: center; margin-bottom: 14px; }
  .title { font-size: 22px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; text-align: center; margin-bottom: 28px; }
  .field { background: #fff; color: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px 14px; font-size: 14px; width: 100%; margin-bottom: 12px; outline: none; transition: border-color .2s; }
  .field:focus { border-color: #6366f1; }
  .btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; transition: opacity .2s; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .msg { font-size: 12px; margin-top: 12px; min-height: 16px; text-align: center; }
  .msg.error { color: #ef4444; }
  .msg.success { color: #10b981; }
  a { color: #6366f1; text-decoration: none; font-size: 12px; display: block; text-align: center; margin-top: 14px; }
</style>
</head>
<body>

<div class="box">
  <div class="icon">🔐</div>
  <div class="title">Redefinir senha</div>
  <div class="subtitle">Defina sua nova senha de acesso</div>

  <form id="reset-form" onsubmit="handleReset(event)">
    <input class="field" type="password" id="new-password" placeholder="Nova senha (mín. 8 caracteres)" minlength="8" required autocomplete="new-password">
    <input class="field" type="password" id="confirm-password" placeholder="Confirmar nova senha" minlength="8" required autocomplete="new-password">
    <button class="btn" type="submit" id="reset-btn">Redefinir senha</button>
    <div class="msg" id="reset-msg"></div>
  </form>

  <a href="/admin/">← Voltar ao login</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="/js/admin/supabase-client.js"></script>
<script>
let recoverySession = false;

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
    recoverySession = true;
  }
});

setTimeout(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) recoverySession = true;
  if (!recoverySession) {
    const msg = document.getElementById('reset-msg');
    msg.className = 'msg error';
    msg.textContent = 'Link inválido ou expirado. Solicite novo link na tela de login.';
    document.getElementById('reset-btn').disabled = true;
  }
}, 800);

window.handleReset = async function(e) {
  e.preventDefault();
  const btn  = document.getElementById('reset-btn');
  const msg  = document.getElementById('reset-msg');
  const pwd  = document.getElementById('new-password').value;
  const conf = document.getElementById('confirm-password').value;

  msg.className = 'msg';
  msg.textContent = '';

  if (pwd !== conf) {
    msg.className = 'msg error';
    msg.textContent = 'Senhas não coincidem';
    return;
  }
  if (pwd.length < 8) {
    msg.className = 'msg error';
    msg.textContent = 'Senha precisa de no mínimo 8 caracteres';
    return;
  }

  btn.disabled = true;
  const { error } = await sb.auth.updateUser({ password: pwd });

  if (error) {
    msg.className = 'msg error';
    msg.textContent = error.message || 'Erro ao redefinir senha';
    btn.disabled = false;
    return;
  }

  msg.className = 'msg success';
  msg.textContent = '✓ Senha redefinida! Redirecionando…';
  setTimeout(() => { window.location.href = '/admin/'; }, 1800);
};
</script>

</body>
</html>
