# ─────────────────────────────────────────────────────────
# Migration Plan EPIC-004 → EPIC-015
# ─────────────────────────────────────────────────────────

migrationPlan:
  strategy: '5-phase additive migration (zero-downtime, rollback-safe)'
  featureFlag: 'EPIC015_NEW_DISPATCH'

  phases:
    - phase: 0
      name: 'Schema-Additive'
      story: '15.A'
      changes:
        - 'CREATE TABLE survey_versions, ac_purchase_events, pending_student_assignments, ac_product_mappings, ac_dispatch_callbacks, meta_templates, survey_recipients (se decidido)'
        - 'ALTER TABLE survey_links ADD COLUMN delivered_at, read_at, version_id NULLABLE, meta_message_id, cohort_snapshot_name'
        - 'ALTER TABLE students ADD COLUMN ac_contact_id UNIQUE NULLABLE'
        - 'ALTER TABLE surveys ADD COLUMN category, current_version_id'
      breaking: false
      reversible: true
      validation: 'Smoke test: surveys legacy continuam funcionando'

    - phase: 1
      name: 'Backfill'
      story: '15.A.bis'
      changes:
        - 'INSERT survey_versions: para cada survey existente, criar v1 com snapshot atual de survey_questions'
        - 'UPDATE survey_links SET version_id = v1 para todos existentes'
        - 'UPDATE survey_links SET cohort_snapshot_name = (SELECT name FROM cohorts WHERE id = surveys.cohort_id) para todos existentes via surveys join'
        - 'UPDATE surveys SET current_version_id = v1.id'
      breaking: false
      reversible: true
      validation: 'Query: SELECT COUNT(*) WHERE version_id IS NULL = 0'

    - phase: 2
      name: 'Dual-Write (feature flag OFF)'
      story: '15.4'
      changes:
        - 'dispatch-survey detecta feature flag EPIC015_NEW_DISPATCH'
        - 'IF flag=OFF: comportamento legacy (filtra por surveys.cohort_id)'
        - 'IF flag=ON: usa survey_recipients explícito + grava version_id + cohort_snapshot_name'
        - 'Default flag=OFF em prod até validation'
      breaking: false
      reversible: true
      validation: 'Tests: ambos paths funcionam isoladamente'

    - phase: 3
      name: 'Shadow Mode (flag ON)'
      story: '15.4 + 15.B'
      changes:
        - 'Liga EPIC015_NEW_DISPATCH=ON em prod'
        - 'Novos surveys (criados pós-deploy) usam path novo'
        - 'Surveys legacy ATIVOS continuam funcionando via fallback no dispatch-survey'
        - 'Monitor: comparar latency, error rate, completeness entre paths'
      duration: '1 sprint mínimo'
      breaking: false
      reversible: true
      validation: 'Métricas: 0 regressão; novos disparos têm version_id + cohort_snapshot_name 100%'

    - phase: 4
      name: 'Cleanup Legacy Path'
      story: '15.M (futura)'
      changes:
        - 'Remove fallback legacy de dispatch-survey'
        - 'Migration: arquivar surveys ativos pré-migração que ainda não foram encerrados'
        - 'Mantém dados históricos (não DELETE)'
      breaking: true
      reversible: false
      validation: 'Smoke test: novos dispatches funcionam; histórico preservado'
      blockedUntil: 'Phase 3 com 4 semanas de produção sem regressão'

  rollbackPlan:
    fromPhase3: 'Disable feature flag EPIC015_NEW_DISPATCH=OFF; legacy path retoma'
    fromPhase2: 'Revert dispatch-survey commit; tabelas novas ficam vazias mas existem'
    fromPhase1: 'TRUNCATE backfilled rows; ALTER COLUMN para NULLABLE'
    fromPhase0: 'DROP TABLE novas; DROP COLUMN novas (perde dados)'

# ─────────────────────────────────────────────────────────
# Risk Assessment Atualizado
# ─────────────────────────────────────────────────────────

risks:
  - id: R-Plan-1
    description: 'Story 15.6 (form builder L=24h) pode estourar sprint'
    severity: medium
    mitigation: 'Split em 15.6a (core 6 tipos) + 15.6b (advanced 7 tipos) se sprint não comportar'

  - id: R-Plan-2
    description: 'Story 15.0 Discovery bloqueia tudo — se OQs não respondidas em prazo'
    severity: high
    mitigation: '@analyst paraleliza Meta template approval (CRIT-6); @devops paraleliza GitHub repo (CRIT-13)'

  - id: R-Plan-3
    description: 'Worker pg_cron pode acumular lag em pico (>50 events em 30s)'
    severity: medium
    mitigation: 'V1 single worker LIMIT 50; V2 escalar batch ou paralelizar com SKIP LOCKED'

  - id: R-Plan-4
    description: 'Migration phase 3 (shadow mode) pode revelar regressões em surveys ativos'
    severity: medium
    mitigation: 'Feature flag OFF default; rollout gradual %; monitoring estrito'

