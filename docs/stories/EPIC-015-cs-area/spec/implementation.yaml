storyId: EPIC-015-cs-area
plannedAt: '2026-05-04T16:45:00Z'
plannedBy: '@architect'
specVersion: 1.1
adrs:
  - ADR-015-cs-portal-tech-stack.md
  - ADR-016-async-dispatch-strategy.md

decisionLog:
  CRIT-1:
    decision: 'Vanilla JS + esbuild + ES Modules + SortableJS'
    rationale: 'Alinhamento total com lesson-pages atual; reuso direto design tokens; bundle ~45KB; curva aprendizado zero para CS team Claude Code; Article IV (No Invention) honrado.'
    adr: ADR-015
  CRIT-4:
    decision: '5-phase migration: schema-additive → backfill → dual-write → dual-read → cleanup'
    rationale: 'Backward-compatible, rollback-safe, sem downtime, sem perda de dados; cohort_id existing fica funcional durante shadow mode; novo código escolhe path via feature flag EPIC015_NEW_DISPATCH.'
    detailedIn: 'implementation.yaml § migrationPlan'
  CRIT-5:
    decision: 'Hybrid B+A: minimal-sync handler + pg_cron worker + warm-up cron'
    rationale: 'Webhook responde p95 < 500ms warm / < 2s cold (só HMAC + INSERT); processamento real em pg_cron worker a cada 30s com SKIP LOCKED; warm-up cron 4min como safety net; idempotência via UNIQUE constraint; latência event→dispatch ~30s aceitável para onboarding.'
    adr: ADR-016

