  next_action: |
    Implementar 3 components backend (já speccados em ADR-018):

    ## Story 18.2b — Worker function process_journey_states()
    Per ADR-018 spec. Função PL/pgSQL que:
    1. Loop em student_journey_states WHERE status='active' AND next_eval_at <= now() LIMIT 200 FOR UPDATE SKIP LOCKED
    2. Pra cada state:
       - Pega journey + step current
       - Avalia trigger (purchase/time/inactivity/at_risk/manual)
       - Action auto-fire (create_pending/slack_alert/tag_student) → executa direto
       - Action externa (send_template/dispatch_survey) → INSERT journey_pending_approvals
    3. Avança current_step + computa next_eval_at baseado em day_offset próximo
    4. Log em journey_executions
    5. statement_timeout = '120s'

    Schedule pg_cron: */5 * * * *

    ## Story 18.2c — Trigger enroll_student_in_journeys()
    AFTER UPDATE em ac_purchase_events quando status mudou pra 'processed':
    - Encontra journeys ativas linkadas ao cohort do mapping
    - INSERT student_journey_states ON CONFLICT DO NOTHING
    - Set next_eval_at = now() + 1min (worker pega imediato)

    Requer: ALTER TABLE ac_product_mappings ADD COLUMN journey_id uuid REFERENCES journeys(id)

    ## Story 18.2d — Anti-fatigue integration
    Em process_journey_states(), antes de enfileirar action externa:
    SELECT (allowed FROM can_dispatch_to_student(student_id))::boolean
    Se false → skip step, mark needs retry, continua

    Use frequency_capping function existente Story 17.7.

    ## Story 18.2e — Approval execution worker
    Quando approval status='approved':
    - Trigger AFTER UPDATE chama execute_approved_journey_action()
    - Function chama dispatch-survey OR create-meta-template baseado em action_type
    - Updates journey_executions com result

