  next_action: |
    Desenhar UX de 2 telas críticas:

    ## 1. /cs/approvals — Queue de aprovações pendentes

    Contexto: worker journey gera approvals em journey_pending_approvals table.
    CS rep precisa revisar + aprovar antes da action externa (send_template/dispatch_survey)
    rodar.

    Requisitos UX:
    - Lista ranqueada por urgência (created_at + step type)
    - Preview action: template name + body renderizado com vars + target student info
    - Botões: ✅ Aprovar | ❌ Rejeitar | ⏰ Snooze 24h
    - Bulk actions (select multiple → aprovar batch)
    - Filtros: action_type, journey, age (>1d, >3d), expiring soon (>5d)
    - Auto-expire 7d default visivel
    - Notificação badge sidebar quando há novos pendentes

    ## 2. /cs/journeys/edit — Visual editor jornadas

    Decisão Uma: V1 YAML editor OR V1 drag-drop?

    Recomendação Aria: V1 YAML monaco-editor + V2 drag-drop ReactFlow.
    YAML é rápido entregar (1 dia), CS power-users escrevem direto.
    Drag-drop demanda 5+d.

    Mas Uma decide UX final.

    Requisitos comuns:
    - Lista steps com day_offset, trigger, action, config
    - Adicionar step (entre quaisquer dois)
    - Reordenar steps
    - Test mode (simular como aluno X passaria pela journey)
    - Save draft / publish / pause journey
    - Preview right panel: timeline visual horizontal mostrando steps

