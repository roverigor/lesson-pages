<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIOS Avançado — Resumo das Aulas</title>
  <link rel="stylesheet" href="../templates/design-tokens-dark-premium.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ========================================
       RESET & BASE
       ======================================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 32px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg-page);
      color: var(--color-text-body);
      line-height: var(--line-height-normal);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ========================================
       LAYOUT STRUCTURE
       ======================================== */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ========================================
       SIDEBAR
       ======================================== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 320px;
      height: 100vh;
      background: var(--color-bg-card);
      border-right: 1px solid var(--color-border-card);
      display: flex;
      flex-direction: column;
      z-index: var(--z-sticky);
      transition: transform var(--transition-normal);
    }

    .sidebar-header {
      padding: var(--spacing-xl) var(--spacing-xl) var(--spacing-lg);
      border-bottom: 1px solid var(--color-border-card);
      background: var(--color-bg-glass);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-xs);
    }

    .sidebar-brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #EF4444, #DC2626);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
    }

    .sidebar-brand-text {
      display: flex;
      flex-direction: column;
    }

    .sidebar-brand-title {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-headline);
      line-height: var(--line-height-tight);
    }

    .sidebar-brand-subtitle {
      font-size: var(--font-size-xs);
      color: var(--color-text-body);
      line-height: var(--line-height-tight);
      margin-top: 2px;
    }

    .sidebar-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(239, 68, 68, 0.12);
      color: #EF4444;
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-wide);
      padding: 3px 8px;
      border-radius: var(--radius-pill);
      margin-top: var(--spacing-xs);
    }

    .sidebar-stats {
      display: flex;
      gap: var(--spacing-lg);
      margin-top: var(--spacing-md);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--color-border-separator);
    }

    .sidebar-stat {
      display: flex;
      flex-direction: column;
    }

    .sidebar-stat-value {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-headline);
      line-height: 1;
    }

    .sidebar-stat-label {
      font-size: 11px;
      color: var(--color-text-body);
      margin-top: 3px;
    }

    .sidebar-search {
      padding: var(--spacing-md) var(--spacing-xl);
      border-bottom: 1px solid var(--color-border-separator);
    }

    .search-input {
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md);
      padding-left: 36px;
      background: var(--color-bg-page);
      border: 1px solid var(--color-border-card);
      border-radius: var(--radius-sm);
      color: var(--color-text-headline);
      font-size: var(--font-size-sm);
      font-family: var(--font-sans);
      outline: none;
      transition: border-color var(--transition-fast);
    }

    .search-input::placeholder {
      color: #555;
    }

    .search-input:focus {
      border-color: var(--color-border-hover);
    }

    .search-wrapper {
      position: relative;
    }

    .search-wrapper .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacing-sm) 0;
    }

    .sidebar-nav::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-nav::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar-nav::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-wider);
      color: #555;
      padding: var(--spacing-md) var(--spacing-xl) var(--spacing-xs);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) var(--spacing-xl);
      cursor: pointer;
      transition: all var(--transition-fast);
      border-left: 3px solid transparent;
      position: relative;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.03);
    }

    .nav-item.active {
      border-left-color: #EF4444;
      background: rgba(239, 68, 68, 0.08);
    }

    .nav-item.active .nav-item-title {
      color: var(--color-text-headline);
    }

    .nav-item-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: var(--font-weight-bold);
      color: var(--color-text-body);
      flex-shrink: 0;
      transition: all var(--transition-fast);
    }

    .nav-item.active .nav-item-number {
      background: rgba(239, 68, 68, 0.2);
      color: #EF4444;
    }

    .nav-item-content {
      flex: 1;
      min-width: 0;
    }

    .nav-item-title {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-body);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color var(--transition-fast);
    }

    .nav-item-date {
      font-size: 11px;
      color: #555;
      margin-top: 1px;
    }

    .nav-separator {
      height: 1px;
      background: var(--color-border-separator);
      margin: var(--spacing-sm) var(--spacing-xl);
    }

    .nav-item-kb {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-xs) var(--spacing-xl);
      cursor: pointer;
      transition: all var(--transition-fast);
      border-left: 3px solid transparent;
    }

    .nav-item-kb:hover {
      background: rgba(255,255,255,0.03);
    }

    .nav-item-kb.active {
      border-left-color: #EF4444;
      background: rgba(239, 68, 68, 0.08);
    }

    .nav-item-kb.active .nav-kb-label {
      color: var(--color-text-headline);
    }

    .nav-kb-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      flex-shrink: 0;
    }

    .nav-kb-label {
      font-size: var(--font-size-sm);
      color: #666;
      font-weight: var(--font-weight-medium);
      transition: color var(--transition-fast);
    }

    /* ========================================
       SIDEBAR TOGGLE
       ======================================== */
    .sidebar-toggle {
      position: fixed;
      top: 16px;
      left: 320px;
      z-index: calc(var(--z-sticky) + 1);
      width: 32px;
      height: 32px;
      background: var(--color-bg-card);
      border: 1px solid var(--color-border-card);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-text-body);
      transition: all var(--transition-normal);
      transform: translateX(-50%);
    }

    .sidebar-toggle:hover {
      background: var(--color-bg-card-alt);
      border-color: var(--color-border-hover);
      color: var(--color-text-headline);
    }

    .sidebar-toggle i {
      width: 16px;
      height: 16px;
      transition: transform var(--transition-normal);
    }

    body.sidebar-collapsed .sidebar {
      transform: translateX(-320px);
    }

    body.sidebar-collapsed .sidebar-toggle {
      left: 0;
      transform: translateX(16px);
    }

    body.sidebar-collapsed .sidebar-toggle i {
      transform: rotate(180deg);
    }

    body.sidebar-collapsed .main-content {
      margin-left: 0;
    }

    /* ========================================
       MOBILE OVERLAY
       ======================================== */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: calc(var(--z-sticky) - 1);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* ========================================
       MAIN CONTENT
       ======================================== */
    .main-content {
      flex: 1;
      margin-left: 320px;
      min-height: 100vh;
      transition: margin-left var(--transition-normal);
    }

    .main-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: var(--spacing-3xl) var(--spacing-2xl) var(--spacing-6xl);
    }

    /* ========================================
       PAGE HEADER
       ======================================== */
    .page-header {
      margin-bottom: var(--spacing-5xl);
    }

    .page-header-top {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
    }

    .page-header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(239, 68, 68, 0.1);
      color: #EF4444;
      font-size: 11px;
      font-weight: var(--font-weight-bold);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-wide);
      padding: 4px 12px;
      border-radius: var(--radius-pill);
    }

    .page-header h1 {
      font-size: var(--font-size-4xl);
      font-weight: var(--font-weight-extrabold);
      color: var(--color-text-headline);
      line-height: var(--line-height-tight);
      letter-spacing: var(--letter-spacing-tight);
      margin-bottom: var(--spacing-md);
    }

    .page-header p {
      font-size: var(--font-size-lg);
      color: var(--color-text-body);
      max-width: 640px;
      line-height: var(--line-height-normal);
    }

    /* ========================================
       LESSON SECTION
       ======================================== */
    .lesson-section {
      margin-bottom: var(--spacing-6xl);
      scroll-margin-top: 32px;
    }

    .lesson-badge-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--spacing-xs);
      margin-bottom: var(--spacing-md);
    }

    .lesson-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: var(--font-weight-bold);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-wide);
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .lesson-badge--green {
      background: rgba(34, 197, 94, 0.12);
      color: #22C55E;
    }

    .lesson-badge--purple {
      background: rgba(168, 85, 247, 0.12);
      color: #A855F7;
    }

    .lesson-badge--red {
      background: rgba(239, 68, 68, 0.12);
      color: #EF4444;
    }

    .lesson-badge-date {
      font-size: 12px;
      color: #666;
      font-weight: var(--font-weight-medium);
    }

    .lesson-headline {
      font-size: var(--font-size-3xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-headline);
      line-height: var(--line-height-snug);
      margin-bottom: var(--spacing-xl);
    }

    /* ========================================
       CONTENT CARDS
       ======================================== */
    .content-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-2xl);
      margin-bottom: var(--spacing-md);
      transition: all var(--transition-normal);
    }

    .content-card:hover {
      border-color: var(--color-border-hover);
      transform: translateY(-2px);
    }

    .content-card-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
    }

    .content-card-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .content-card-icon--blue {
      background: rgba(59, 130, 246, 0.12);
      color: #3B82F6;
    }

    .content-card-icon--green {
      background: rgba(34, 197, 94, 0.12);
      color: #22C55E;
    }

    .content-card-icon--amber {
      background: rgba(245, 158, 11, 0.12);
      color: #F59E0B;
    }

    .content-card-icon--purple {
      background: rgba(168, 85, 247, 0.12);
      color: #A855F7;
    }

    .content-card-icon--red {
      background: rgba(239, 68, 68, 0.12);
      color: #EF4444;
    }

    .content-card-icon--cyan {
      background: rgba(6, 182, 212, 0.12);
      color: #06B6D4;
    }

    .content-card-icon i {
      width: 18px;
      height: 18px;
    }

    .content-card-title {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-headline);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-wide);
    }

    .content-card-body {
      font-size: var(--font-size-md);
      color: var(--color-text-body);
      line-height: var(--line-height-normal);
    }

    .content-card-body p {
      margin-bottom: var(--spacing-sm);
    }

    .content-card-body p:last-child {
      margin-bottom: 0;
    }

    /* Topic tags */
    .topic-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-xs);
    }

    .topic-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--color-text-body-alt);
      font-size: var(--font-size-sm);
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      transition: all var(--transition-fast);
    }

    .topic-tag:hover {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: var(--color-text-headline);
    }

    .topic-tag i {
      width: 12px;
      height: 12px;
    }

    /* Placeholder content */
    .placeholder-content {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-md) var(--spacing-lg);
      background: rgba(255,255,255,0.02);
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      color: #555;
      font-size: var(--font-size-sm);
      font-style: italic;
    }

    .placeholder-content i {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    /* Links card */
    .link-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) 0;
      border-bottom: 1px solid var(--color-border-separator);
      transition: all var(--transition-fast);
    }

    .link-item:last-child {
      border-bottom: none;
    }

    .link-item-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(59, 130, 246, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3B82F6;
      flex-shrink: 0;
    }

    .link-item-icon i {
      width: 14px;
      height: 14px;
    }

    .link-item a {
      color: #3B82F6;
      font-size: var(--font-size-sm);
      word-break: break-all;
      transition: color var(--transition-fast);
    }

    .link-item a:hover {
      color: #60A5FA;
      text-decoration: underline;
    }

    .link-item-label {
      font-size: var(--font-size-sm);
      color: var(--color-text-body);
      margin-right: var(--spacing-xs);
      white-space: nowrap;
      font-weight: var(--font-weight-medium);
    }

    /* ========================================
       KNOWLEDGE BASE SECTIONS
       ======================================== */
    .kb-section {
      margin-bottom: var(--spacing-6xl);
      scroll-margin-top: 32px;
    }

    .kb-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-xl);
    }

    .kb-header-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .kb-header-icon--amber {
      background: rgba(245, 158, 11, 0.12);
      color: #F59E0B;
    }

    .kb-header-icon--purple {
      background: rgba(168, 85, 247, 0.12);
      color: #A855F7;
    }

    .kb-header-icon--blue {
      background: rgba(59, 130, 246, 0.12);
      color: #3B82F6;
    }

    .kb-header-icon i {
      width: 24px;
      height: 24px;
    }

    .kb-title {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-headline);
    }

    .kb-search {
      margin-bottom: var(--spacing-lg);
      max-width: 400px;
    }

    .kb-message {
      font-size: var(--font-size-md);
      color: var(--color-text-body);
      margin-bottom: var(--spacing-lg);
      line-height: var(--line-height-normal);
    }

    .kb-placeholder-card {
      background: var(--color-bg-card);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: var(--spacing-3xl) var(--spacing-2xl);
      text-align: center;
    }

    .kb-placeholder-card-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--spacing-md);
      color: #444;
    }

    .kb-placeholder-card-icon i {
      width: 22px;
      height: 22px;
    }

    .kb-placeholder-card p {
      color: #555;
      font-size: var(--font-size-sm);
      font-style: italic;
    }

    /* Filter dropdown */
    .filter-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
    }

    .filter-label {
      font-size: var(--font-size-sm);
      color: var(--color-text-body);
      font-weight: var(--font-weight-medium);
    }

    .filter-select {
      background: var(--color-bg-page);
      border: 1px solid var(--color-border-card);
      border-radius: var(--radius-sm);
      color: var(--color-text-headline);
      font-size: var(--font-size-sm);
      font-family: var(--font-sans);
      padding: var(--spacing-xs) var(--spacing-md);
      outline: none;
      cursor: pointer;
      transition: border-color var(--transition-fast);
    }

    .filter-select:focus {
      border-color: var(--color-border-hover);
    }

    /* ========================================
       MOBILE HAMBURGER
       ======================================== */
    .mobile-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--color-bg-glass);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--color-border-card);
      z-index: calc(var(--z-sticky) + 2);
      padding: 0 var(--spacing-md);
      align-items: center;
      gap: var(--spacing-sm);
    }

    .mobile-hamburger {
      width: 40px;
      height: 40px;
      background: none;
      border: 1px solid var(--color-border-card);
      border-radius: var(--radius-sm);
      color: var(--color-text-headline);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .mobile-hamburger i {
      width: 20px;
      height: 20px;
    }

    .mobile-header-title {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-headline);
    }

    /* ========================================
       RESPONSIVE
       ======================================== */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-320px);
        width: 300px;
        z-index: calc(var(--z-modal) + 1);
      }

      .sidebar.mobile-open {
        transform: translateX(0);
      }

      .sidebar-overlay.visible {
        display: block;
        z-index: var(--z-modal);
      }

      .sidebar-toggle {
        display: none;
      }

      .mobile-header {
        display: flex;
      }

      .main-content {
        margin-left: 0;
        padding-top: 56px;
      }

      .main-inner {
        padding: var(--spacing-xl) var(--spacing-md) var(--spacing-4xl);
      }

      .page-header h1 {
        font-size: var(--font-size-3xl);
      }

      .lesson-headline {
        font-size: var(--font-size-2xl);
      }

      .content-card {
        padding: var(--spacing-xl);
      }

      .page-header {
        margin-bottom: var(--spacing-3xl);
      }

      .lesson-section {
        margin-bottom: var(--spacing-4xl);
        scroll-margin-top: 72px;
      }

      .kb-section {
        margin-bottom: var(--spacing-4xl);
        scroll-margin-top: 72px;
      }
    }

    @media (max-width: 480px) {
      .page-header h1 {
        font-size: var(--font-size-2xl);
      }

      .lesson-headline {
        font-size: var(--font-size-xl);
      }

      .sidebar-stats {
        gap: var(--spacing-md);
      }

      .content-card {
        padding: var(--spacing-lg);
      }
    }
  </style>
</head>
<body>

  <!-- Mobile Header -->
  <header class="mobile-header">
    <button class="mobile-hamburger" id="mobileMenuBtn" aria-label="Abrir menu">
      <i data-lucide="menu"></i>
    </button>
    <span class="mobile-header-title">AIOS Avançado</span>
  </header>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">
            <i data-lucide="brain" style="width:20px;height:20px;"></i>
          </div>
          <div class="sidebar-brand-text">
            <span class="sidebar-brand-title">AIOS Avançado</span>
            <span class="sidebar-brand-subtitle">Resumo das Aulas</span>
          </div>
        </div>
        <span class="sidebar-badge">
          <i data-lucide="users" style="width:10px;height:10px;"></i>
          COHORT
        </span>
        <div class="sidebar-stats">
          <div class="sidebar-stat">
            <span class="sidebar-stat-value">6</span>
            <span class="sidebar-stat-label">Sessões</span>
          </div>
          <div class="sidebar-stat">
            <span class="sidebar-stat-value">8.9</span>
            <span class="sidebar-stat-label">Média Satisfação</span>
          </div>
        </div>
      </div>

      <div class="sidebar-search">
        <div class="search-wrapper">
          <i data-lucide="search" class="search-icon"></i>
          <input type="text" class="search-input" id="sidebarSearch" placeholder="Buscar aula...">
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <div id="nav-loading" style="padding:20px;text-align:center;color:#555;font-size:12px;">Carregando...</div>
      </nav>
    </aside>

    <!-- Sidebar Toggle (desktop) -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <i data-lucide="chevron-left"></i>
    </button>

    <!-- Main Content -->
    <main class="main-content">
      <div class="main-inner">

        <!-- Page Header -->
        <div class="page-header">
          <div class="page-header-top">
            <span class="page-header-badge">
              <i data-lucide="graduation-cap" style="width:12px;height:12px;"></i>
              Cohort AIOS Avançado
            </span>
          </div>
          <h1>Resumo das Aulas</h1>
          <p>Todas as aulas do cohort compiladas com resumos, tópicos, pontos-chave, takeaways e links extraídos automaticamente.</p>
        </div>

        <div id="sections-loading" style="padding:60px 0;text-align:center;color:#555;">
          <div style="width:32px;height:32px;border:2px solid #222;border-top-color:#EF4444;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
          <div style="font-size:13px;">Carregando aulas...</div>
        </div>
        <div id="sections-container"></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </main>

  </div>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.469.0"></script>
  <script>
  (function() {
    var SUPABASE_URL = 'https://gpufcipkajppykmnmdeh.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwdWZjaXBrYWpwcHlrbW5tZGVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzE1NzgsImV4cCI6MjA4OTk0NzU3OH0.BBmvIGbMtp3bPirWxjMXwdXkpABBV6zD1wgSQ2cB8aU';

    // ============================================================
    // FETCH LESSON ABSTRACTS FROM SUPABASE
    // ============================================================
    async function fetchAbstracts() {
      var res = await fetch(
        SUPABASE_URL + '/rest/v1/lesson_abstracts?select=*&order=sort_order',
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    // ============================================================
    // FORMAT DATE
    // ============================================================
    function fmtDate(iso) {
      var d = new Date(iso + 'T00:00:00');
      var months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      return d.getDate().toString().padStart(2,'0') + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    }

    // ============================================================
    // NAV ITEM NUMBER / ICON
    // ============================================================
    function navNumber(row) {
      var slug = row.slug;
      if (slug === 'aula-preparatorio') return '<span class="nav-item-number">P</span>';
      if (slug.startsWith('ps-')) return '<span class="nav-item-number" style="font-size:9px;"><i data-lucide="heart-pulse" style="width:14px;height:14px;"></i></span>';
      var m = row.badge_label.match(/\d+/);
      return '<span class="nav-item-number">' + (m ? m[0].padStart(2,'0') : '?') + '</span>';
    }

    // Nav title label
    function navTitle(row) {
      var slug = row.slug;
      if (slug.startsWith('ps-')) {
        return '<div class="nav-item-title" style="display:flex;align-items:center;gap:6px;">PS - Pronto Socorro <span style="font-size:9px;padding:1px 6px;border-radius:99px;background:rgba(168,85,247,0.15);color:#A855F7;font-weight:700;white-space:nowrap;">3 salas</span></div>';
      }
      return '<div class="nav-item-title">' + row.badge_label + '</div>';
    }

    // KB icon
    function kbIcon(slug) {
      var map = { glossario: 'book-text', faq: 'help-circle', qa: 'message-circle' };
      return map[slug] || 'book-open';
    }

    // ============================================================
    // BADGE ICON
    // ============================================================
    function badgeIcon(row) {
      var slug = row.slug;
      if (slug.startsWith('ps-')) return 'heart-pulse';
      if (row.badge_class === 'purple') return 'sparkles';
      return 'play';
    }

    // ============================================================
    // BUILD SIDEBAR NAV
    // ============================================================
    function buildNav(abstracts) {
      var lessons = abstracts.filter(function(r) { return r.section_type === 'lesson'; });
      var kbs = abstracts.filter(function(r) { return r.section_type === 'kb'; });

      var html = '<div class="nav-section-label">Aulas</div>';
      lessons.forEach(function(row) {
        html += '<div class="nav-item" data-target="' + row.slug + '">';
        html += navNumber(row);
        html += '<div class="nav-item-content">';
        html += navTitle(row);
        html += '<div class="nav-item-date">' + fmtDate(row.lesson_date) + '</div>';
        html += '</div></div>';
      });

      html += '<div class="nav-separator"></div>';
      kbs.forEach(function(row) {
        html += '<div class="nav-item-kb" data-target="' + row.slug + '">';
        html += '<span class="nav-kb-icon"><i data-lucide="' + kbIcon(row.slug) + '" style="width:16px;height:16px;"></i></span>';
        html += '<span class="nav-kb-label">' + row.title + '</span>';
        html += '</div>';
      });

      return html;
    }

    // ============================================================
    // BUILD SECTIONS HTML
    // ============================================================
    function buildSections(abstracts) {
      var html = '';
      abstracts.forEach(function(row) {
        if (row.section_type === 'lesson') {
          html += '<section class="lesson-section" id="' + row.slug + '">';
          html += '<div class="lesson-badge-row">';
          html += '<span class="lesson-badge lesson-badge--' + row.badge_class + '">';
          html += '<i data-lucide="' + badgeIcon(row) + '" style="width:12px;height:12px;"></i> ';
          html += row.badge_label;
          html += '</span>';
          html += '<span class="lesson-badge-date">' + fmtDate(row.lesson_date) + '</span>';
          html += '</div>';
          html += '<h2 class="lesson-headline">' + row.title + '</h2>';
          html += row.body_html;
          html += '</section>';
        } else {
          html += '<section class="kb-section" id="' + row.slug + '">';
          html += row.body_html;
          html += '</section>';
        }
      });
      return html;
    }

    // ============================================================
    // UPDATE SIDEBAR STATS
    // ============================================================
    function updateStats(abstracts) {
      var lessonCount = abstracts.filter(function(r) { return r.section_type === 'lesson'; }).length;
      var statVal = document.querySelector('.sidebar-stat-value');
      if (statVal) statVal.textContent = lessonCount;
    }

    // ============================================================
    // INIT INTERACTIVE BEHAVIOURS
    // ============================================================
    function initBehaviours() {
      var sidebar = document.getElementById('sidebar');
      var sidebarToggle = document.getElementById('sidebarToggle');
      var sidebarOverlay = document.getElementById('sidebarOverlay');
      var mobileMenuBtn = document.getElementById('mobileMenuBtn');
      var sidebarSearch = document.getElementById('sidebarSearch');
      var sidebarNav = document.getElementById('sidebarNav');
      var navItems = sidebarNav.querySelectorAll('.nav-item, .nav-item-kb');
      var sections = document.querySelectorAll('.lesson-section, .kb-section');

      sidebarToggle.addEventListener('click', function() {
        document.body.classList.toggle('sidebar-collapsed');
      });

      function openMobileMenu() {
        sidebar.classList.add('mobile-open');
        sidebarOverlay.classList.add('visible');
        document.body.style.overflow = 'hidden';
      }
      function closeMobileMenu() {
        sidebar.classList.remove('mobile-open');
        sidebarOverlay.classList.remove('visible');
        document.body.style.overflow = '';
      }

      mobileMenuBtn.addEventListener('click', openMobileMenu);
      sidebarOverlay.addEventListener('click', closeMobileMenu);

      navItems.forEach(function(item) {
        item.addEventListener('click', function() {
          var targetId = this.getAttribute('data-target');
          var targetEl = document.getElementById(targetId);
          if (targetEl) {
            navItems.forEach(function(n) { n.classList.remove('active'); });
            this.classList.add('active');
            targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            closeMobileMenu();
          }
        });
      });

      sidebarSearch.addEventListener('input', function() {
        var q = this.value.toLowerCase().trim();
        sidebarNav.querySelectorAll('.nav-item').forEach(function(item) {
          var title = item.querySelector('.nav-item-title');
          var date = item.querySelector('.nav-item-date');
          var text = (title ? title.textContent : '') + ' ' + (date ? date.textContent : '');
          item.style.display = (!q || text.toLowerCase().includes(q)) ? '' : 'none';
        });
      });

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var id = entry.target.id;
            navItems.forEach(function(item) {
              item.classList.toggle('active', item.getAttribute('data-target') === id);
            });
          }
        });
      }, { root: null, rootMargin: '-80px 0px -60% 0px', threshold: 0 });

      sections.forEach(function(s) { observer.observe(s); });

      // Q&A filter
      var qaFilter = document.querySelector('#qa .filter-select');
      if (qaFilter) {
        qaFilter.addEventListener('change', function() {
          var val = this.value;
          document.querySelectorAll('.qa-session').forEach(function(s) {
            s.style.display = (val === 'all' || s.getAttribute('data-qa-aula') === val) ? '' : 'none';
          });
        });
      }

      // Glossary search
      var glossarySearch = document.querySelector('#glossario .search-input');
      if (glossarySearch) {
        glossarySearch.addEventListener('input', function() {
          var q = this.value.toLowerCase().trim();
          document.querySelectorAll('#glossario .glossary-card').forEach(function(c) {
            c.style.display = (!q || c.textContent.toLowerCase().includes(q)) ? '' : 'none';
          });
          document.querySelectorAll('#glossario .glossary-group').forEach(function(g) {
            g.style.display = g.querySelectorAll('.glossary-card:not([style*="none"])').length > 0 ? '' : 'none';
          });
        });
      }

      // FAQ search
      var faqSearch = document.querySelector('#faq .search-input');
      if (faqSearch) {
        faqSearch.addEventListener('input', function() {
          var q = this.value.toLowerCase().trim();
          document.querySelectorAll('#faq .faq-item').forEach(function(i) {
            i.style.display = (!q || i.textContent.toLowerCase().includes(q)) ? '' : 'none';
          });
          document.querySelectorAll('#faq .faq-group').forEach(function(g) {
            g.style.display = g.querySelectorAll('.faq-item:not([style*="none"])').length > 0 ? '' : 'none';
          });
        });
      }

      lucide.createIcons();
    }

    // ============================================================
    // MAIN RENDER
    // ============================================================
    fetchAbstracts().then(function(abstracts) {
      // Sidebar nav
      var nav = document.getElementById('sidebarNav');
      nav.innerHTML = buildNav(abstracts);

      // Main sections
      var loading = document.getElementById('sections-loading');
      var container = document.getElementById('sections-container');
      container.innerHTML = buildSections(abstracts);
      loading.style.display = 'none';

      // Sidebar stats
      updateStats(abstracts);

      // Init all interactions
      initBehaviours();

    }).catch(function(err) {
      document.getElementById('sections-loading').innerHTML =
        '<div style="text-align:center;color:#f87171;padding:40px;font-size:13px;">Erro ao carregar aulas: ' + err.message + '</div>';
      document.getElementById('nav-loading').innerHTML =
        '<div style="color:#f87171;font-size:11px;padding:16px;">Erro ao carregar</div>';
      lucide.createIcons();
    });
  })();
  </script>
</body>
