name: Deploy Lesson Pages → VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Job 1: Lint + Smoke Tests ────────────────────────────────────────────
  test:
    name: Lint & Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Smoke Tests
        run: npm test
        env:
          APP_URL: https://painel.igorrover.com.br

  # ─── Job 2: Deploy (só executa se tests passaram) ─────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            REPO_DIR=/app/lesson-pages

            # Clona se não existir
            if [ ! -d "$REPO_DIR/.git" ]; then
              mkdir -p /app
              git clone https://github.com/roverigor/lesson-pages.git $REPO_DIR
            fi

            cd $REPO_DIR
            git fetch origin main
            git reset --hard origin/main

            # Build imagem
            docker build -t lesson-pages:latest .

            # Sobe container (cria ou recria)
            cd infra
            docker compose up -d --force-recreate

            echo "✅ Deploy concluído em $(date)"
