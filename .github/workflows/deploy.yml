name: Deploy Lesson Pages → VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            REPO_DIR=/app/lesson-pages

            # Clona se não existir
            if [ ! -d "$REPO_DIR/.git" ]; then
              mkdir -p /app
              git clone https://github.com/roverigor/lesson-pages.git $REPO_DIR
            fi

            cd $REPO_DIR
            git fetch origin main
            git reset --hard origin/main

            # Build imagem
            docker build -t lesson-pages:latest .

            # Sobe container (cria ou recria)
            cd infra
            docker compose up -d --force-recreate

            echo "✅ Deploy concluído em $(date)"
