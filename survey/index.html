<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avaliação · Academia Lendária</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <style>
    :root { --accent: #6366f1; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808;
      color: #ddd;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .container { width: 100%; max-width: 520px; }
    .progress-bar { height: 3px; background: #1a1a1a; border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }
    .card { background: #0f0f0f; border: 1px solid #1e1e1e; border-radius: 20px; padding: 36px 32px; }
    .brand { font-size: 11px; color: #333; letter-spacing: .08em; text-transform: uppercase; font-weight: 700; margin-bottom: 24px; }
    .q-counter { font-size: 11px; color: #444; margin-bottom: 10px; font-weight: 600; }
    .question { font-size: 22px; font-weight: 800; color: #fff; line-height: 1.35; margin-bottom: 32px; }
    .sub-context { font-size: 13px; color: #888; margin-bottom: 28px; line-height: 1.5; }

    .nps-grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 5px; margin-bottom: 8px; }
    .nps-btn {
      aspect-ratio: 1; border: 1px solid #222; border-radius: 8px;
      background: #0d0d0d; color: #666; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .nps-btn:hover { border-color: var(--accent); color: #fff; }
    .nps-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
    .nps-btn.det.selected  { background: #ef4444; border-color: #ef4444; }
    .nps-btn.neu.selected  { background: #f59e0b; border-color: #f59e0b; }
    .nps-btn.pro.selected  { background: #22c55e; border-color: #22c55e; }
    .nps-labels { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-bottom: 28px; }

    .text-input {
      width: 100%; background: #0d0d0d; border: 1px solid #1e1e1e;
      border-radius: 10px; padding: 12px 14px; color: #ddd;
      font-size: 14px; font-family: inherit; resize: none;
      min-height: 90px; transition: border-color .15s; margin-bottom: 16px;
    }
    .text-input:focus { outline: none; border-color: var(--accent); }
    .name-input { min-height: auto; height: 44px; }

    .label-sm { font-size: 11px; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }

    .cta-btn {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; margin-top: 8px;
      transition: background .15s, opacity .15s;
    }
    .cta-btn:hover:not(:disabled) { background: #4f52d4; }
    .cta-btn:disabled { opacity: .4; cursor: not-allowed; }

    .screen { display: none; }
    .screen.active { display: block; }

    .thanks-icon {
      width: 72px; height: 72px;
      background: rgba(34,197,94,.12);
      border: 2px solid rgba(34,197,94,.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 20px;
    }
    .thanks-title { font-size: 24px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 8px; }
    .thanks-sub { font-size: 14px; color: #aaa; text-align: center; line-height: 1.5; }

    .thanks-icon.detractor { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.3); }
    .thanks-icon.passive { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.3); }

    .error-icon { font-size: 36px; text-align: center; margin-bottom: 16px; }
    .error-title { font-size: 18px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 8px; }
    .error-msg { font-size: 13px; color: #888; text-align: center; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1e1e1e;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 32px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
      .question { font-size: 18px; }
      .nps-btn { font-size: 11px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="card">

    <!-- Loading -->
    <div class="screen active" id="screen-loading">
      <div class="spinner"></div>
    </div>

    <!-- Error -->
    <div class="screen" id="screen-error">
      <div class="error-icon">😔</div>
      <div class="error-title" id="error-title">Link inválido</div>
      <div class="error-msg" id="error-msg">Este link é inválido, expirou ou já foi usado.</div>
    </div>

    <!-- Question -->
    <div class="screen" id="screen-question">
      <div class="brand">Academia Lendária</div>
      <div class="q-counter" id="q-counter">Avaliação rápida</div>
      <div class="question" id="question-text">De 0 a 10, o quanto a aula foi útil pra você?</div>
      <div class="sub-context" id="sub-context"></div>

      <div class="nps-grid" id="nps-grid"></div>
      <div class="nps-labels">
        <span>Nada útil</span>
        <span>Muito útil</span>
      </div>

      <div id="name-field-wrap" style="display:none">
        <div class="label-sm">Nome (opcional)</div>
        <input id="name-input" type="text" class="text-input name-input" placeholder="Como podemos te chamar?">
      </div>

      <div class="label-sm">Comentário (opcional)</div>
      <textarea id="comment-input" class="text-input" placeholder="O que mais marcou? O que poderia melhorar?"></textarea>

      <button id="btn-submit" class="cta-btn" disabled>Enviar avaliação →</button>
    </div>

    <!-- Thank you -->
    <div class="screen" id="screen-thanks">
      <div class="thanks-icon" id="thanks-icon">✓</div>
      <div class="thanks-title" id="thanks-title">Obrigado!</div>
      <div class="thanks-sub" id="thanks-sub">Sua avaliação foi registrada. Seu feedback nos ajuda a evoluir cada encontro. 🚀</div>
    </div>

  </div>
</div>

<script src="/js/config.js"></script>
<script>
  const SUPABASE_URL = window.SUPABASE_CONFIG?.url ?? "https://gpufcipkajppykmnmdeh.supabase.co";
  const SUPABASE_KEY = window.SUPABASE_CONFIG?.anonKey ?? "";

  let selectedScore = null;
  let parsedToken   = null;
  let parsedMode    = null;
  let meta          = null;

  const $ = (id) => document.getElementById(id);
  const show = (id) => $(id).classList.add("active");
  const hide = (id) => $(id).classList.remove("active");

  function showOnly(id) {
    ["screen-loading","screen-error","screen-question","screen-thanks"].forEach((s) =>
      s === id ? show(s) : hide(s),
    );
  }

  function showError(title, msg) {
    $("error-title").textContent = title;
    $("error-msg").textContent = msg;
    showOnly("screen-error");
  }

  function getToken() {
    const m = location.pathname.match(/^\/survey\/(grupo|aluno)\/([^/]+)$/);
    if (m) return { mode: m[1] === "grupo" ? "group" : "dm", token: m[2] };
    const params = new URLSearchParams(location.search);
    const token = params.get("token");
    const mode = params.get("mode");
    if (token) return { mode: mode || null, token };
    return null;
  }

  function renderNpsButtons() {
    const grid = $("nps-grid");
    grid.innerHTML = "";
    for (let i = 0; i <= 10; i++) {
      const btn = document.createElement("button");
      btn.className = "nps-btn";
      btn.classList.add(i <= 6 ? "det" : i <= 8 ? "neu" : "pro");
      btn.textContent = i;
      btn.addEventListener("click", () => {
        selectedScore = i;
        document.querySelectorAll(".nps-btn").forEach((b) => b.classList.remove("selected"));
        btn.classList.add("selected");
        $("btn-submit").disabled = false;
        $("progress").style.width = "50%";
      });
      grid.appendChild(btn);
    }
  }

  async function fetchMetadata(token) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_nps_link_metadata`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
      },
      body: JSON.stringify({ p_token: token }),
    });
    if (!res.ok) throw new Error(`metadata_${res.status}`);
    const rows = await res.json();
    return Array.isArray(rows) ? rows[0] : rows;
  }

  function recordOpen(token) {
    fetch(`${SUPABASE_URL}/rest/v1/rpc/record_link_open`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
      },
      body: JSON.stringify({
        p_source: "nps_class_link",
        p_token: token,
        p_user_agent: navigator.userAgent.slice(0, 500),
        p_referer: document.referrer || null,
      }),
    }).catch(() => {});
  }

  async function submitResponse() {
    if (selectedScore == null) return;
    $("btn-submit").disabled = true;
    $("btn-submit").textContent = "Enviando...";
    $("progress").style.width = "85%";

    const comment = $("comment-input").value.trim();
    const name = $("name-input").value.trim();

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/submit-survey-group`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          token: parsedToken,
          nps_score: selectedScore,
          comment: comment || undefined,
          name_provided: name || undefined,
        }),
      });
      const data = await res.json().catch(() => ({}));

      if (res.ok && data.success) {
        $("progress").style.width = "100%";
        const bucket = data.bucket ?? "promoter";
        const iconEl = $("thanks-icon");
        if (bucket === "detractor") {
          iconEl.className = "thanks-icon detractor";
          iconEl.textContent = "🙏";
          $("thanks-title").textContent = "Obrigado pelo feedback";
        } else if (bucket === "passive") {
          iconEl.className = "thanks-icon passive";
          iconEl.textContent = "💛";
          $("thanks-title").textContent = "Valeu pela nota!";
        } else {
          iconEl.className = "thanks-icon";
          iconEl.textContent = "🎉";
          $("thanks-title").textContent = "Obrigado!";
        }
        $("thanks-sub").innerHTML = (data.thank_you ?? "Sua avaliação foi registrada.").replace(/\n/g, "<br>");
        showOnly("screen-thanks");
        return;
      }

      let msg = "Não foi possível enviar. Tente novamente.";
      if (res.status === 410) msg = "Este link expirou.";
      else if (res.status === 429) msg = "Você já respondeu hoje. Obrigado!";
      else if (res.status === 404) msg = "Link inválido.";
      showError("Erro ao enviar", msg);
    } catch (e) {
      showError("Erro de conexão", "Verifique sua internet e tente novamente.");
    }
  }

  async function init() {
    showOnly("screen-loading");
    $("progress").style.width = "25%";

    const parsed = getToken();
    if (!parsed) {
      showError("Link inválido", "Nenhum token encontrado na URL.");
      return;
    }
    parsedToken = parsed.token;
    parsedMode  = parsed.mode;

    try {
      meta = await fetchMetadata(parsedToken);
    } catch (e) {
      showError("Erro ao validar", `Não consegui validar o link. (${e.message})`);
      return;
    }

    if (!meta || !meta.valid) {
      if (meta?.expired) {
        showError("Link expirado", "Este link de avaliação expirou.");
      } else {
        showError("Link inválido", "Este link não foi reconhecido.");
      }
      return;
    }

    recordOpen(parsedToken);

    const greeting = meta.mode === "dm" && meta.student_name
      ? `Olá, ${meta.student_name.split(/\s+/)[0]}! 👋`
      : "Avaliação rápida";
    $("q-counter").textContent = greeting;

    $("question-text").textContent = `Como foi a aula de hoje?`;
    $("sub-context").textContent = `${meta.class_name} — ${meta.cohort_name}`;

    if (meta.mode === "group") {
      $("name-field-wrap").style.display = "block";
    }

    renderNpsButtons();
    $("btn-submit").addEventListener("click", submitResponse);
    showOnly("screen-question");
  }

  init();
</script>
</body>
</html>
